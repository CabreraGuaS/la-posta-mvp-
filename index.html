<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Posta - MVP</title>
    <!-- React 18 & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Babel Standalone -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
        @keyframes slideUp {
            from { transform: translateY(100%); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .animate-slide-up { animation: slideUp 0.3s ease-out forwards; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const LaPostaMVP = () => {
            const [currentPage, setCurrentPage] = useState('welcome');
            const [cart, setCart] = useState([]);
            const [savedCart, setSavedCart] = useState(null);
            const [userEmail, setUserEmail] = useState('');
            const [userName, setUserName] = useState('');
            const [hasMembership, setHasMembership] = useState(false);

            // Historial de compras
            const [lastOrder, setLastOrder] = useState(null);

            // Notificación Pop-up
            const [addedNotification, setAddedNotification] = useState(null);

            // Checkout state
            const [orderPlaced, setOrderPlaced] = useState(false);
            const [generatedOrderNumber, setGeneratedOrderNumber] = useState('');
            const [address, setAddress] = useState('');
            const [paymentMethod, setPaymentMethod] = useState('mercadopago');
            const [selectedDeliveryDate, setSelectedDeliveryDate] = useState('');
            const [selectedTimeSlot, setSelectedTimeSlot] = useState('09:00 - 13:00');
            const [deliveryNotes, setDeliveryNotes] = useState('');

            // Pop-up dura 6 segundos
            useEffect(() => {
                if (addedNotification) {
                    const timer = setTimeout(() => {
                        setAddedNotification(null);
                    }, 6000);
                    return () => clearTimeout(timer);
                }
            }, [addedNotification]);

            const getMinDeliveryDate = () => {
                const date = new Date();
                let addedDays = 0;
                while (addedDays < 3) {
                    date.setDate(date.getDate() + 1);
                    if (date.getDay() !== 0 && date.getDay() !== 6) {
                        addedDays++;
                    }
                }
                return date.toISOString().split('T')[0];
            };

            const minDateStr = getMinDeliveryDate();

            // CATÁLOGO EXTENDIDO (Para soportar recetas)
            const products = {
                panificados: [
                    { id: 'p1', name: 'Pan sin TACC Integral (Fargo)', category: 'Panificados', price: 520, image: '🍞', brand: 'Fargo', certified: true, stock: 15 },
                    { id: 'p2', name: 'Medialunas sin TACC', category: 'Panificados', price: 720, image: '🥐', brand: 'Celidarina', certified: true, stock: 8 },
                    { id: 'p3', name: 'Galletitas de agua sin TACC', category: 'Panificados', price: 340, image: '🍘', brand: 'Smack', certified: true, stock: 20 }
                ],
                frescosAlmacen: [
                    { id: 'a1', name: 'Quinoa Real (500g)', category: 'Almacén', price: 2500, image: '🌾', brand: 'NutriBio', certified: true, stock: 12 },
                    { id: 'a2', name: 'Avena certificada sin TACC (500g)', category: 'Almacén', price: 1800, image: '🥣', brand: 'NaturAl', certified: true, stock: 15 },
                    { id: 'a3', name: 'Aceite de Oliva Extra Virgen (500ml)', category: 'Almacén', price: 4500, image: '🫒', brand: 'Zuelo', certified: true, stock: 10 },
                    { id: 'f1', name: 'Huevos de campo (6 unidades)', category: 'Frescos', price: 1300, image: '🥚', brand: 'Granja Rosa', certified: true, stock: 25 },
                    { id: 'f2', name: 'Bananas Ecuador (kg)', category: 'Verdulería', price: 1100, image: '🍌', brand: 'Fruver', certified: true, stock: 18 },
                    { id: 'f3', name: 'Papas Seleccionadas (kg)', category: 'Verdulería', price: 900, image: '🥔', brand: 'Fruver', certified: true, stock: 30 },
                    { id: 'f4', name: 'Zucchini fresco (kg)', category: 'Verdulería', price: 1200, image: '🥒', brand: 'Fruver', certified: true, stock: 10 },
                    { id: 'f5', name: 'Patas-muslos de Pollo (kg)', category: 'Carnicería', price: 3200, image: '🍗', brand: 'Avícola San Juan', certified: true, stock: 8 }
                ],
                harinas: [
                    { id: 'h1', name: 'Premezcla Universal sin TACC', category: 'Harinas', price: 1050, image: '🌾', brand: 'Santalucía', certified: true, stock: 12 },
                    { id: 'h2', name: 'Harina de Almendras Premium', category: 'Harinas', price: 2100, image: '🥜', brand: 'NutriFit', certified: true, stock: 6 }
                ],
                snacks: [
                    { id: 's1', name: 'Barra de Chocolate Algarroba', category: 'Snacks', price: 480, image: '🍫', brand: 'Zafrán', certified: true, stock: 18 },
                    { id: 's2', name: 'Barrita de Quinua y Miel', category: 'Snacks', price: 420, image: '🍱', brand: 'Crowie', certified: true, stock: 14 }
                ]
            };

            const allProducts = Object.values(products).flat();

            // RECETAS DEL WORD INTEGRADAS
            const communityRecipes = [
                {
                    id: 'rec1',
                    title: '🥣 Bowl tibio de quinoa y vegetales',
                    time: '25 minutos',
                    servings: '2 porciones',
                    ingredients: [
                        { text: '1 taza de quinoa', productId: 'a1' },
                        { text: '1 zucchini', productId: 'f4' },
                        { text: '1 zanahoria', productId: null },
                        { text: '2 cucharadas de aceite de oliva', productId: 'a3' },
                        { text: 'Jugo de ½ limón, sal y condimentos', productId: null }
                    ],
                    instructions: [
                        'Lavar bien la quinoa y cocinarla según las indicaciones.',
                        'Cortar los vegetales en cubos y saltearlos con aceite de oliva.',
                        'Mezclar los vegetales con la quinoa y condimentar.'
                    ]
                },
                {
                    id: 'rec2',
                    title: '🥞 Panqueques de banana y avena sin TACC',
                    time: '15 minutos',
                    servings: '2 porciones',
                    ingredients: [
                        { text: '2 bananas maduras', productId: 'f2' },
                        { text: '2 huevos', productId: 'f1' },
                        { text: '1 taza de avena certificada sin TACC', productId: 'a2' },
                        { text: 'Polvo de hornear y esencia de vainilla', productId: null }
                    ],
                    instructions: [
                        'Licuar todos los ingredientes hasta obtener una mezcla homogénea.',
                        'Calentar una sartén antiadherente apenas aceitada.',
                        'Cocinar pequeñas porciones durante 2 minutos por lado.'
                    ]
                },
                {
                    id: 'rec3',
                    title: '🍗 Pollo al horno con papas y romero',
                    time: '45 minutos',
                    servings: '4 porciones',
                    ingredients: [
                        { text: '4 supremas o patas-muslos de pollo', productId: 'f5' },
                        { text: '4 papas medianas', productId: 'f3' },
                        { text: '2 cucharadas de aceite de oliva', productId: 'a3' },
                        { text: 'Romero, ajo, sal y limón', productId: null }
                    ],
                    instructions: [
                        'Precalentar el horno a 200 °C y cortar las papas en gajos.',
                        'Colocar pollo y papas en una fuente con aceite y especias.',
                        'Hornear entre 40 y 45 minutos dándolo vuelta a mitad de cocción.'
                    ]
                }
            ];

            useEffect(() => {
                try {
                    const savedUser = localStorage.getItem('lapostaUser');
                    const savedUserName = localStorage.getItem('lapostaUserName');
                    const savedMembership = localStorage.getItem('lapostaMembership');
                    const savedLastOrder = localStorage.getItem(`lapostaLastOrder_${savedUser}`);
                    
                    if (savedUser) {
                        setUserEmail(savedUser);
                        const savedCartData = localStorage.getItem(`lapostaCart_${savedUser}`);
                        if (savedCartData) setSavedCart(JSON.parse(savedCartData));
                    }
                    if (savedUserName) setUserName(savedUserName);
                    if (savedMembership) setHasMembership(JSON.parse(savedMembership));
                    if (savedLastOrder) setLastOrder(JSON.parse(savedLastOrder));
                } catch (e) {
                    console.error("Error cargando localStorage", e);
                }
            }, []);

            const calculatePrice = (product, quantity = 1) => {
                let price = product.price;
                if (hasMembership) price = price * 0.9;
                if (quantity > 3) price = price * 0.95;
                return Math.round(price);
            };

            const calculateCartTotal = () => {
                let subtotal = 0;
                let totalItems = 0;
                cart.forEach(item => {
                    const qty = item.quantity || 1;
                    totalItems += qty;
                    subtotal += calculatePrice(item, qty) * qty;
                });
                const shipping = hasMembership ? 0 : 350;
                return { subtotal, total: subtotal + shipping, shipping, totalItems };
            };

            const generateOrderNumber = () => {
                const timestamp = Date.now().toString().slice(-6);
                const random = Math.floor(Math.random() * 1000).toString().padStart(3, '0');
                return `LP-${timestamp}-${random}`;
            };

            const cartSummary = calculateCartTotal();

            const isValidEmail = (email) => email.includes('@') && email.includes('.');

            const updateProductQuantity = (product, newQty) => {
                const existingIndex = cart.findIndex(p => p.id === product.id);
                if (newQty <= 0) {
                    setCart(cart.filter(p => p.id !== product.id));
                } else if (existingIndex >= 0) {
                    const updated = [...cart];
                    updated[existingIndex].quantity = newQty;
                    setCart(updated);
                } else {
                    setCart([...cart, { ...product, quantity: newQty, cartId: Math.random() }]);
                    setAddedNotification({ ...product, quantity: newQty });
                }
            };

            const addRecipeToCart = (recipe) => {
                let addedAny = false;
                recipe.ingredients.forEach(ing => {
                    if (ing.productId) {
                        const prod = allProducts.find(p => p.id === ing.productId);
                        if (prod) {
                            const inCart = cart.find(p => p.id === prod.id);
                            const currentQty = inCart ? inCart.quantity : 0;
                            updateProductQuantity(prod, currentQty + 1);
                            addedAny = true;
                        }
                    }
                });
                if (addedAny) {
                    alert(`¡Ingredientes disponibles de "${recipe.title}" cargados al carrito!`);
                }
            };

            // WELCOME
            const renderWelcomePage = () => (
                <div className="min-h-screen bg-gradient-to-b from-amber-50 to-amber-100 p-6 flex flex-col justify-center items-center">
                    <div className="text-6xl mb-4">🌾</div>
                    <h1 className="text-4xl font-bold text-amber-900 mb-2">La Posta</h1>
                    <p className="text-xl text-amber-800 mb-6 text-center">Tu mes sin TACC resuelto</p>
                    
                    <div className="bg-white rounded-lg p-6 max-w-md w-full mb-8 shadow-lg">
                        <label className="block text-xs font-semibold text-gray-600 mb-1">Tu Email *</label>
                        <input
                            type="email"
                            placeholder="ejemplo@email.com"
                            value={userEmail}
                            onChange={(e) => setUserEmail(e.target.value)}
                            className="w-full px-4 py-2 border border-gray-300 rounded-lg mb-3 focus:outline-none focus:ring-2 focus:ring-amber-500"
                        />
                        <label className="block text-xs font-semibold text-gray-600 mb-1">Nombre (Opcional)</label>
                        <input
                            type="text"
                            placeholder="Tu nombre"
                            value={userName}
                            onChange={(e) => setUserName(e.target.value)}
                            className="w-full px-4 py-2 border border-gray-300 rounded-lg mb-4 focus:outline-none focus:ring-2 focus:ring-amber-500"
                        />
                        <button
                            onClick={() => {
                                if (isValidEmail(userEmail)) {
                                    const cleanEmail = userEmail.trim().toLowerCase();
                                    const displayName = userName.trim() || cleanEmail.split('@')[0];
                                    setUserEmail(cleanEmail);
                                    setUserName(displayName);
                                    localStorage.setItem('lapostaUser', cleanEmail);
                                    localStorage.setItem('lapostaUserName', displayName);
                                    setCurrentPage('membership');
                                }
                            }}
                            disabled={!isValidEmail(userEmail)}
                            className="w-full bg-amber-700 text-white py-3 rounded-lg font-semibold disabled:opacity-50 hover:bg-amber-800 transition"
                        >
                            Ingresar
                        </button>
                    </div>
                </div>
            );

            // MEMBERSHIP
            const renderMembershipPage = () => (
                <div className="min-h-screen bg-gradient-to-b from-purple-50 to-purple-100 p-6">
                    <div className="max-w-md mx-auto pt-8 space-y-4">
                        <h2 className="text-2xl font-bold text-purple-900 mb-2">¡Hola, {userName}!</h2>
                        <div 
                            onClick={() => { setHasMembership(false); localStorage.setItem('lapostaMembership', 'false'); setCurrentPage('home'); }}
                            className="bg-white p-6 rounded-lg border-2 border-gray-300 cursor-pointer hover:border-amber-500 transition"
                        >
                            <p className="font-semibold text-lg mb-2">Sin Membresía</p>
                            <button className="w-full bg-gray-400 text-white py-2 rounded font-semibold mt-2">Empezar sin membresía</button>
                        </div>
                        <div 
                            onClick={() => { setHasMembership(true); localStorage.setItem('lapostaMembership', 'true'); setCurrentPage('home'); }}
                            className="bg-gradient-to-br from-amber-100 to-amber-50 p-6 rounded-lg border-2 border-amber-500 cursor-pointer hover:shadow-lg transition ring-2 ring-amber-300"
                        >
                            <div className="flex justify-between items-start mb-2">
                                <p className="font-semibold text-lg text-amber-900">Membresía Mensual</p>
                                <span className="bg-amber-500 text-white text-xs px-3 py-1 rounded-full font-bold">MEJOR VALOR</span>
                            </div>
                            <p className="text-2xl font-bold text-amber-700 mb-2">10% descuento</p>
                            <button className="w-full bg-amber-600 text-white py-2 rounded font-semibold hover:bg-amber-700 mt-2">Activar membresía</button>
                        </div>
                    </div>
                </div>
            );

            // HOME
            const renderHomePage = () => (
                <div className="min-h-screen bg-gray-50 pb-20">
                    <div className="bg-amber-700 text-white p-4 sticky top-0 z-10">
                        <div className="flex justify-between items-center mb-1">
                            <h1 className="text-2xl font-bold">La Posta</h1>
                            <button onClick={() => setCurrentPage('cart')} className="text-2xl relative">
                                🛒
                                {cart.length > 0 && (
                                    <span className="absolute -top-1 -right-2 bg-red-500 text-white text-xs rounded-full w-5 h-5 flex items-center justify-center font-bold">
                                        {cartSummary.totalItems}
                                    </span>
                                )}
                            </button>
                        </div>
                        <p className="text-xs text-amber-100">Sesión: {userEmail}</p>
                    </div>

                    <div className="p-4 space-y-6">
                        {Object.entries({
                            'Panificados': products.panificados,
                            'Frescos y Almacén': products.frescosAlmacen,
                            'Harinas': products.harinas,
                            'Snacks': products.snacks
                        }).map(([category, items]) => (
                            <div key={category}>
                                <h3 className="text-lg font-bold text-gray-800 mb-3">{category}</h3>
                                <div className="space-y-3">
                                    {items.map(product => {
                                        const inCart = cart.find(p => p.id === product.id);
                                        const qty = inCart ? (inCart.quantity || 1) : 0;
                                        const pricePerUnit = calculatePrice(product, qty || 1);
                                        
                                        return (
                                            <div key={product.id} className="bg-white p-4 rounded-lg border border-gray-200 shadow-sm flex justify-between items-center">
                                                <div>
                                                    <span className="text-2xl mr-2">{product.image}</span>
                                                    <span className="font-semibold text-gray-800 text-sm">{product.name}</span>
                                                    <p className="text-xs text-gray-500">{product.brand} - ${pricePerUnit}</p>
                                                </div>
                                                <div>
                                                    {qty === 0 ? (
                                                        <button onClick={() => updateProductQuantity(product, 1)} className="bg-amber-700 text-white px-3 py-1 rounded text-xs font-semibold">
                                                            + Agregar
                                                        </button>
                                                    ) : (
                                                        <div className="flex items-center gap-2 bg-amber-50 p-1 rounded border border-amber-200">
                                                            <button onClick={() => updateProductQuantity(product, qty - 1)} className="w-6 h-6 bg-white text-amber-800 font-bold rounded">−</button>
                                                            <span className="text-xs font-bold">{qty}</span>
                                                            <button onClick={() => updateProductQuantity(product, qty + 1)} className="w-6 h-6 bg-amber-700 text-white font-bold rounded">+</button>
                                                        </div>
                                                    )}
                                                </div>
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>
                        ))}
                    </div>

                    <BottomNav active="home" />
                </div>
            );

            // PROFILE PAGE
            const renderProfilePage = () => (
                <div className="min-h-screen bg-gray-50 pb-20">
                    <div className="bg-amber-700 text-white p-4">
                        <button onClick={() => setCurrentPage('home')} className="text-amber-100 text-sm mb-1">← Volver</button>
                        <h1 className="text-2xl font-bold">Mi Perfil</h1>
                    </div>

                    <div className="p-4 space-y-4 max-w-md mx-auto">
                        <div className="bg-white p-4 rounded-lg shadow-sm border border-gray-200">
                            <h3 className="font-bold text-gray-800 mb-2">📋 Datos de Cuenta</h3>
                            <p className="text-sm text-gray-600"><strong>Nombre:</strong> {userName || 'Cliente'}</p>
                            <p className="text-sm text-gray-600"><strong>Email:</strong> {userEmail}</p>
                        </div>

                        <div className="bg-white p-4 rounded-lg shadow-sm border border-gray-200">
                            <h3 className="font-bold text-gray-800 mb-3">📦 Compra Anterior</h3>
                            {lastOrder ? (
                                <div className="space-y-3">
                                    <div className="bg-amber-50 p-3 rounded text-xs space-y-1">
                                        <p><strong>Pedido:</strong> {lastOrder.orderNumber} ({lastOrder.date})</p>
                                        <p><strong>Total:</strong> ${lastOrder.total}</p>
                                    </div>
                                    <button
                                        onClick={() => { setCart(lastOrder.items); setCurrentPage('cart'); }}
                                        className="w-full bg-amber-700 text-white py-2 rounded text-sm font-semibold hover:bg-amber-800"
                                    >
                                        🔄 Repetir este pedido en el carrito
                                    </button>
                                </div>
                            ) : (
                                <p className="text-sm text-gray-500 italic">No posees compras anteriores registradas.</p>
                            )}
                        </div>
                    </div>

                    <BottomNav active="profile" />
                </div>
            );

            // CART PAGE (CON ATAJO A COMPRA ANTERIOR)
            const renderCartPage = () => {
                const { subtotal, total, shipping } = calculateCartTotal();

                return (
                    <div className="min-h-screen bg-gray-50 pb-24">
                        <div className="bg-amber-700 text-white p-4">
                            <button onClick={() => setCurrentPage('home')} className="text-amber-100 text-sm mb-1">← Volver</button>
                            <h1 className="text-2xl font-bold">Mi Carrito</h1>
                        </div>

                        <div className="p-4 space-y-4 max-w-md mx-auto">
                            {/* ATAJO REQUERIDO A COMPRA ANTERIOR */}
                            {lastOrder && (
                                <div className="bg-amber-50 border-l-4 border-amber-600 p-3 rounded flex justify-between items-center shadow-sm">
                                    <div>
                                        <p className="text-xs font-bold text-amber-900">¿Querés repetir tu última compra?</p>
                                        <p className="text-xs text-amber-700">Ver detalles del pedido {lastOrder.orderNumber}</p>
                                    </div>
                                    <button
                                        onClick={() => setCurrentPage('profile')}
                                        className="bg-amber-700 text-white text-xs px-3 py-1.5 rounded font-semibold hover:bg-amber-800"
                                    >
                                        Ver anterior ↺
                                    </button>
                                </div>
                            )}

                            {cart.length === 0 ? (
                                <div className="p-6 text-center text-gray-500">Tu carrito está vacío</div>
                            ) : (
                                <>
                                    {cart.map((item, idx) => (
                                        <div key={idx} className="bg-white p-3 rounded shadow-sm flex justify-between items-center text-sm">
                                            <div>
                                                <p className="font-semibold">{item.image} {item.name}</p>
                                                <p className="text-xs text-gray-500">${calculatePrice(item, item.quantity)} x {item.quantity || 1}</p>
                                            </div>
                                            <button onClick={() => updateProductQuantity(item, 0)} className="text-red-500 font-bold">✕</button>
                                        </div>
                                    ))}

                                    <div className="bg-white p-4 rounded shadow-sm space-y-2 text-sm">
                                        <div className="flex justify-between"><span>Subtotal:</span><span>${subtotal}</span></div>
                                        <div className="flex justify-between"><span>Envío:</span><span>${shipping}</span></div>
                                        <div className="flex justify-between font-bold text-base border-t pt-2"><span>Total:</span><span className="text-amber-700">${total}</span></div>
                                    </div>

                                    <button onClick={() => setCurrentPage('checkout')} className="w-full bg-amber-700 text-white py-3 rounded font-semibold">
                                        Proceder al pago
                                    </button>
                                </>
                            )}
                        </div>

                        <BottomNav active="cart" />
                    </div>
                );
            };

            // CHECKOUT
            const renderCheckoutPage = () => {
                const { total } = calculateCartTotal();

                if (orderPlaced) {
                    return (
                        <div className="min-h-screen bg-green-50 p-6 flex flex-col justify-center items-center text-center">
                            <h1 className="text-3xl font-bold text-green-900 mb-2">¡Pedido Confirmado!</h1>
                            <p className="text-sm text-gray-600 mb-4">Código: {generatedOrderNumber}</p>
                            <button
                                onClick={() => window.open('https://form.typeform.com/to/YVsFpl4n', '_blank')}
                                className="w-full max-w-md bg-blue-600 text-white py-3 rounded font-semibold mb-3"
                            >
                                Completar formulario de feedback (5 min aprox.)
                            </button>
                            <button onClick={() => { setCart([]); setOrderPlaced(false); setCurrentPage('home'); }} className="w-full max-w-md bg-green-700 text-white py-3 rounded font-semibold">
                                Volver al inicio
                            </button>
                        </div>
                    );
                }

                return (
                    <div className="min-h-screen bg-gray-50 p-4 max-w-md mx-auto space-y-4">
                        <h2 className="text-xl font-bold text-gray-800">Finalizar Pedido</h2>
                        <input
                            type="text"
                            placeholder="Dirección de entrega *"
                            value={address}
                            onChange={(e) => setAddress(e.target.value)}
                            className="w-full p-2 border rounded text-sm"
                        />
                        <button
                            onClick={() => {
                                if (address) {
                                    const num = generateOrderNumber();
                                    setGeneratedOrderNumber(num);
                                    setLastOrder({ orderNumber: num, date: new Date().toLocaleDateString('es-AR'), items: cart, total });
                                    localStorage.setItem(`lapostaLastOrder_${userEmail}`, JSON.stringify({ orderNumber: num, date: new Date().toLocaleDateString('es-AR'), items: cart, total }));
                                    setOrderPlaced(true);
                                } else alert('Ingresá una dirección');
                            }}
                            className="w-full bg-amber-700 text-white py-3 rounded font-semibold"
                        >
                            Confirmar Compra (${total})
                        </button>
                    </div>
                );
            };

            // SECCIÓN COMUNIDAD (AJUSTADA A TU SOLICITUD)
            const renderCommunityPage = () => (
                <div className="min-h-screen bg-gray-50 pb-20">
                    <div className="bg-amber-700 text-white p-4">
                        <button onClick={() => setCurrentPage('home')} className="text-amber-100 text-sm mb-1">← Volver</button>
                        <h1 className="text-2xl font-bold">Comunidad & Recetas</h1>
                    </div>

                    <div className="p-4 space-y-6 max-w-md mx-auto">
                        {/* ACLARACIÓN DE DESARROLLO */}
                        <div className="bg-purple-50 border-l-4 border-purple-600 p-3 rounded text-xs text-purple-900 leading-relaxed">
                            💡 <strong>Sección en desarrollo:</strong> Aquí podrás armar la lista de ingredientes para tus comidas desde recetas generadas por IA o compartidas por la comunidad. Próximamente se añadirán más funciones de interacción social.
                        </div>

                        {/* RECETAS INTERACTIVAS */}
                        <div className="space-y-4">
                            <h2 className="text-lg font-bold text-gray-800">📖 Recetas Saludables sin TACC</h2>
                            {communityRecipes.map(recipe => (
                                <div key={recipe.id} className="bg-white p-4 rounded-lg border border-gray-200 shadow-sm space-y-3">
                                    <div className="flex justify-between items-start border-b pb-2">
                                        <div>
                                            <h3 className="font-bold text-gray-800 text-base">{recipe.title}</h3>
                                            <p className="text-xs text-gray-500">⏱️ {recipe.time} | 🍽️ {recipe.servings}</p>
                                        </div>
                                    </div>

                                    <div>
                                        <p className="text-xs font-bold text-amber-800 mb-1">Ingredientes:</p>
                                        <ul className="text-xs space-y-1 text-gray-600">
                                            {recipe.ingredients.map((ing, i) => (
                                                <li key={i} className="flex justify-between items-center">
                                                    <span>• {ing.text}</span>
                                                    {ing.productId ? (
                                                        <button
                                                            onClick={() => {
                                                                const prod = allProducts.find(p => p.id === ing.productId);
                                                                if (prod) updateProductQuantity(prod, 1);
                                                            }}
                                                            className="text-amber-700 font-bold hover:underline"
                                                        >
                                                            + Añadir
                                                        </button>
                                                    ) : (
                                                        <span className="text-gray-400 text-[10px] italic">(Habitual)</span>
                                                    )}
                                                </li>
                                            ))}
                                        </ul>
                                    </div>

                                    <button
                                        onClick={() => addRecipeToCart(recipe)}
                                        className="w-full bg-amber-700 text-white py-2 rounded text-xs font-semibold hover:bg-amber-800 transition"
                                    >
                                        🛒 Cargar ingredientes disponibles al carrito
                                    </button>
                                </div>
                            ))}
                        </div>

                        {/* TARJETAS RESTAURANTES Y OPINIONES (FUTURO) */}
                        <div className="space-y-3 pt-2">
                            <h2 className="text-md font-bold text-gray-700">Próximamente en Comunidad:</h2>
                            
                            <div className="bg-white p-4 rounded-lg border border-gray-200 opacity-75 relative">
                                <span className="absolute top-3 right-3 bg-gray-200 text-gray-700 text-[10px] font-bold px-2 py-0.5 rounded">PRÓXIMAMENTE</span>
                                <h3 className="font-bold text-gray-800 text-sm mb-1">📍 Mapa de Restaurantes sin TACC</h3>
                                <p className="text-xs text-gray-500">Descubrí lugares seguros e impecables cerca de tu ubicación en CABA y AMBA.</p>
                            </div>

                            <div className="bg-white p-4 rounded-lg border border-gray-200 opacity-75 relative">
                                <span className="absolute top-3 right-3 bg-gray-200 text-gray-700 text-[10px] font-bold px-2 py-0.5 rounded">PRÓXIMAMENTE</span>
                                <h3 className="font-bold text-gray-800 text-sm mb-1">💬 Foro & Reseñas de Marcas</h3>
                                <p className="text-xs text-gray-500">Votá y leé recomendaciones de otros usuarios sobre nuevos lanzamientos del mercado.</p>
                            </div>
                        </div>
                    </div>

                    <BottomNav active="community" />
                </div>
            );

            // NAVEGACIÓN INFERIOR
            const BottomNav = ({ active }) => (
                <div className="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 flex justify-around p-3 z-20">
                    <button onClick={() => setCurrentPage('home')} className={`flex flex-col items-center text-xs font-semibold ${active === 'home' ? 'text-amber-700' : 'text-gray-500'}`}>
                        <span className="text-xl">🏠</span>Inicio
                    </button>
                    <button onClick={() => setCurrentPage('cart')} className={`flex flex-col items-center text-xs font-semibold relative ${active === 'cart' ? 'text-amber-700' : 'text-gray-500'}`}>
                        <span className="text-xl">🛒</span>Carrito
                    </button>
                    <button onClick={() => setCurrentPage('profile')} className={`flex flex-col items-center text-xs font-semibold ${active === 'profile' ? 'text-amber-700' : 'text-gray-500'}`}>
                        <span className="text-xl">👤</span>Perfil
                    </button>
                    <button onClick={() => setCurrentPage('community')} className={`flex flex-col items-center text-xs font-semibold ${active === 'community' ? 'text-amber-700' : 'text-gray-500'}`}>
                        <span className="text-xl">🥣</span>Comunidad
                    </button>
                </div>
            );

            return (
                <div>
                    {currentPage === 'welcome' && renderWelcomePage()}
                    {currentPage === 'membership' && renderMembershipPage()}
                    {currentPage === 'home' && renderHomePage()}
                    {currentPage === 'profile' && renderProfilePage()}
                    {currentPage === 'cart' && renderCartPage()}
                    {currentPage === 'checkout' && renderCheckoutPage()}
                    {currentPage === 'community' && renderCommunityPage()}
                </div>
            );
        };

        const container = document.getElementById('root');
        const root = ReactDOM.createRoot(container);
        root.render(<LaPostaMVP />);
    </script>
</body>
</html>
