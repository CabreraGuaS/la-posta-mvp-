<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Posta - MVP</title>
    <!-- React 18 & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Babel Standalone para transformar JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
        
        @keyframes slideUp {
            from { transform: translateY(100%); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .animate-slide-up {
            animation: slideUp 0.3s ease-out forwards;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const LaPostaMVP = () => {
            const [currentPage, setCurrentPage] = useState('welcome');
            const [cart, setCart] = useState([]);
            const [savedCart, setSavedCart] = useState(null);
            const [userEmail, setUserEmail] = useState('');
            const [userName, setUserName] = useState('');
            const [hasMembership, setHasMembership] = useState(false);

            // Historial de compras para la sección de Usuario
            const [lastOrder, setLastOrder] = useState(null);

            // Estado para el cartel/notificación de "Producto Agregado"
            const [addedNotification, setAddedNotification] = useState(null);

            // Checkout state
            const [orderPlaced, setOrderPlaced] = useState(false);
            const [generatedOrderNumber, setGeneratedOrderNumber] = useState('');
            const [address, setAddress] = useState('');
            const [paymentMethod, setPaymentMethod] = useState('mercadopago');
            const [selectedDeliveryDate, setSelectedDeliveryDate] = useState('');
            const [selectedTimeSlot, setSelectedTimeSlot] = useState('09:00 - 13:00');
            const [deliveryNotes, setDeliveryNotes] = useState('');

            // Pop-up dura 6 segundos (2 segundos más)
            useEffect(() => {
                if (addedNotification) {
                    const timer = setTimeout(() => {
                        setAddedNotification(null);
                    }, 6000);
                    return () => clearTimeout(timer);
                }
            }, [addedNotification]);

            const getMinDeliveryDate = () => {
                const date = new Date();
                let addedDays = 0;
                while (addedDays < 3) {
                    date.setDate(date.getDate() + 1);
                    if (date.getDay() !== 0 && date.getDay() !== 6) {
                        addedDays++;
                    }
                }
                return date.toISOString().split('T')[0];
            };

            const minDateStr = getMinDeliveryDate();

            const products = {
                panificados: [
                    {
                        id: 'p1',
                        name: 'Pan sin TACC Integral (Fargo)',
                        category: 'Panificados',
                        price: 520,
                        image: '🍞',
                        brand: 'Fargo',
                        composition: 'Almidón de maíz, harina de arroz, agua, sal, levadura, semillas',
                        certified: true,
                        stock: 15
                    },
                    {
                        id: 'p2',
                        name: 'Medialunas sin TACC',
                        category: 'Panificados',
                        price: 720,
                        image: '🥐',
                        brand: 'Celidarina',
                        composition: 'Harina de arroz, manteca, azúcar, sal, levadura',
                        certified: true,
                        stock: 8
                    },
                    {
                        id: 'p3',
                        name: 'Galletitas de agua sin TACC',
                        category: 'Panificados',
                        price: 340,
                        image: '🍘',
                        brand: 'Smack',
                        composition: 'Almidón de papa, aceite de girasol, sal, leudante',
                        certified: true,
                        stock: 20
                    }
                ],
                harinas: [
                    {
                        id: 'h1',
                        name: 'Premezcla Universal sin TACC',
                        category: 'Harinas',
                        price: 1050,
                        image: '🌾',
                        brand: 'Santalucía',
                        composition: 'Harina de arroz, almidón de maíz, goma xantana, sal',
                        certified: true,
                        stock: 12
                    },
                    {
                        id: 'h2',
                        name: 'Harina de Almendras Premium',
                        category: 'Harinas',
                        price: 2100,
                        image: '🥜',
                        brand: 'NutriFit',
                        composition: '100% almendra molida, sin aditivos',
                        certified: true,
                        stock: 6
                    }
                ],
                snacks: [
                    {
                        id: 's1',
                        name: 'Barra de Chocolate Algarroba',
                        category: 'Snacks',
                        price: 480,
                        image: '🍫',
                        brand: 'Zafrán',
                        composition: 'Algarroba, cacao, azúcar, aceite de coco',
                        certified: true,
                        stock: 18
                    },
                    {
                        id: 's2',
                        name: 'Barrita de Quinua y Miel',
                        category: 'Snacks',
                        price: 420,
                        image: '🍱',
                        brand: 'Crowie',
                        composition: 'Quinua inflada, miel, almíbar, semillas',
                        certified: true,
                        stock: 14
                    }
                ],
                congelados: [
                    {
                        id: 'c1',
                        name: 'Empanadas de Carne sin TACC (6u)',
                        category: 'Congelados',
                        price: 1080,
                        image: '🥟',
                        brand: 'La Celiaca',
                        composition: 'Carne vacuna, cebolla, especias, masa de arroz',
                        certified: true,
                        stock: 10
                    }
                ]
            };

            const allProducts = Object.values(products).flat();

            useEffect(() => {
                try {
                    const savedUser = localStorage.getItem('lapostaUser');
                    const savedUserName = localStorage.getItem('lapostaUserName');
                    const savedMembership = localStorage.getItem('lapostaMembership');
                    const savedLastOrder = localStorage.getItem(`lapostaLastOrder_${savedUser}`);
                    
                    if (savedUser) {
                        setUserEmail(savedUser);
                        const savedCartData = localStorage.getItem(`lapostaCart_${savedUser}`);
                        if (savedCartData) setSavedCart(JSON.parse(savedCartData));
                    }
                    if (savedUserName) setUserName(savedUserName);
                    if (savedMembership) setHasMembership(JSON.parse(savedMembership));
                    if (savedLastOrder) setLastOrder(JSON.parse(savedLastOrder));
                } catch (e) {
                    console.error("Error al cargar localStorage", e);
                }
            }, []);

            const calculatePrice = (product, quantity = 1) => {
                let price = product.price;
                if (hasMembership) {
                    price = price * 0.9;
                }
                if (quantity > 3) {
                    price = price * 0.95;
                }
                return Math.round(price);
            };

            const calculateCartTotal = () => {
                let subtotal = 0;
                let totalItems = 0;
                
                cart.forEach(item => {
                    const qty = item.quantity || 1;
                    totalItems += qty;
                    const unitPrice = calculatePrice(item, qty);
                    subtotal += unitPrice * qty;
                });

                const shipping = hasMembership ? 0 : 350;
                const total = subtotal + shipping;

                return { subtotal, total, shipping, totalItems };
            };

            const generateOrderNumber = () => {
                const timestamp = Date.now().toString().slice(-6);
                const random = Math.floor(Math.random() * 1000).toString().padStart(3, '0');
                return `LP-${timestamp}-${random}`;
            };

            const cartSummary = calculateCartTotal();

            const isValidEmail = (email) => {
                return email.includes('@') && email.includes('.');
            };

            // Manejo dinámico de cantidad en catálogo
            const updateProductQuantity = (product, newQty) => {
                const existingIndex = cart.findIndex(p => p.id === product.id);
                if (newQty <= 0) {
                    setCart(cart.filter(p => p.id !== product.id));
                } else if (existingIndex >= 0) {
                    const updated = [...cart];
                    updated[existingIndex].quantity = newQty;
                    setCart(updated);
                } else {
                    setCart([...cart, { ...product, quantity: newQty, cartId: Math.random() }]);
                    setAddedNotification({ ...product, quantity: newQty });
                }
            };

            // WELCOME
            const renderWelcomePage = () => (
                <div className="min-h-screen bg-gradient-to-b from-amber-50 to-amber-100 p-6 flex flex-col justify-center items-center">
                    <div className="text-6xl mb-4">🌾</div>
                    <h1 className="text-4xl font-bold text-amber-900 mb-2">La Posta</h1>
                    <p className="text-xl text-amber-800 mb-6 text-center">Tu mes sin TACC resuelto</p>
                    
                    <div className="bg-white rounded-lg p-6 max-w-md w-full mb-8 shadow-lg">
                        <div className="space-y-4 mb-6">
                            <div className="flex items-start gap-3">
                                <span className="text-green-600 text-xl mt-1">✓</span>
                                <div>
                                    <p className="font-semibold">Precios al por mayor</p>
                                    <p className="text-sm text-gray-600">Compra en volumen = menor costo</p>
                                </div>
                            </div>
                            <div className="flex items-start gap-3">
                                <span className="text-green-600 text-xl mt-1">✓</span>
                                <div>
                                    <p className="font-semibold">Todo certificado sin TACC</p>
                                    <p className="text-sm text-gray-600">Sello SENASA en cada producto</p>
                                </div>
                            </div>
                            <div className="flex items-start gap-3">
                                <span className="text-green-600 text-xl mt-1">✓</span>
                                <div>
                                    <p className="font-semibold">Envío a domicilio</p>
                                    <p className="text-sm text-gray-600">CABA y AMBA con tracking</p>
                                </div>
                            </div>
                        </div>

                        <label className="block text-xs font-semibold text-gray-600 mb-1">Tu Email *</label>
                        <input
                            type="email"
                            placeholder="ejemplo@email.com"
                            value={userEmail}
                            onChange={(e) => setUserEmail(e.target.value)}
                            className="w-full px-4 py-2 border border-gray-300 rounded-lg mb-3 focus:outline-none focus:ring-2 focus:ring-amber-500"
                        />

                        <label className="block text-xs font-semibold text-gray-600 mb-1">Nombre (Opcional)</label>
                        <input
                            type="text"
                            placeholder="Tu nombre"
                            value={userName}
                            onChange={(e) => setUserName(e.target.value)}
                            className="w-full px-4 py-2 border border-gray-300 rounded-lg mb-4 focus:outline-none focus:ring-2 focus:ring-amber-500"
                        />
                        
                        <button
                            onClick={() => {
                                if (isValidEmail(userEmail)) {
                                    const cleanEmail = userEmail.trim().toLowerCase();
                                    const displayName = userName.trim() || cleanEmail.split('@')[0];
                                    
                                    setUserEmail(cleanEmail);
                                    setUserName(displayName);

                                    localStorage.setItem('lapostaUser', cleanEmail);
                                    localStorage.setItem('lapostaUserName', displayName);

                                    const saved = localStorage.getItem(`lapostaCart_${cleanEmail}`);
                                    if (saved) setSavedCart(JSON.parse(saved));

                                    const savedOrder = localStorage.getItem(`lapostaLastOrder_${cleanEmail}`);
                                    if (savedOrder) setLastOrder(JSON.parse(savedOrder));

                                    setCurrentPage('membership');
                                }
                            }}
                            disabled={!isValidEmail(userEmail)}
                            className="w-full bg-amber-700 text-white py-3 rounded-lg font-semibold disabled:opacity-50 hover:bg-amber-800 transition"
                        >
                            Ingresar
                        </button>
                    </div>
                </div>
            );

            // MEMBERSHIP
            const renderMembershipPage = () => (
                <div className="min-h-screen bg-gradient-to-b from-purple-50 to-purple-100 p-6">
                    <div className="max-w-md mx-auto pt-8">
                        <h2 className="text-2xl font-bold text-purple-900 mb-2">¡Hola, {userName}!</h2>
                        <p className="text-sm text-purple-700 mb-6">Usuario: {userEmail}</p>

                        <h2 className="text-xl font-bold text-gray-800 mb-4">Elige tu plan</h2>
                        
                        <div className="space-y-4">
                            <div 
                                onClick={() => {
                                    setHasMembership(false);
                                    localStorage.setItem('lapostaMembership', 'false');
                                    setCurrentPage('home');
                                }}
                                className="bg-white p-6 rounded-lg border-2 border-gray-300 cursor-pointer hover:border-amber-500 transition"
                            >
                                <p className="font-semibold text-lg mb-2">Sin Membresía</p>
                                <p className="text-gray-600 mb-4">Prueba primero</p>
                                <ul className="text-sm space-y-2 mb-4">
                                    <li>✓ Acceso a catálogo completo</li>
                                    <li>✓ Productos certificados SENASA</li>
                                    <li>✓ Envío a domicilio: $350</li>
                                    <li>✗ Sin descuentos adicionales</li>
                                </ul>
                                <button className="w-full bg-gray-400 text-white py-2 rounded font-semibold">
                                    Empezar sin membresía
                                </button>
                            </div>

                            <div 
                                onClick={() => {
                                    setHasMembership(true);
                                    localStorage.setItem('lapostaMembership', 'true');
                                    setCurrentPage('home');
                                }}
                                className="bg-gradient-to-br from-amber-100 to-amber-50 p-6 rounded-lg border-2 border-amber-500 cursor-pointer hover:shadow-lg transition ring-2 ring-amber-300"
                            >
                                <div className="flex justify-between items-start mb-2">
                                    <p className="font-semibold text-lg text-amber-900">Membresía Mensual</p>
                                    <span className="bg-amber-500 text-white text-xs px-3 py-1 rounded-full font-bold">MEJOR VALOR</span>
                                </div>
                                <p className="text-2xl font-bold text-amber-700 mb-2">10% descuento</p>
                                <p className="text-sm text-amber-700 mb-4">+ 5% extra si compras &gt; 3 unidades</p>
                                <ul className="text-sm space-y-2 mb-4">
                                    <li>✓ 10% descuento en todos los productos</li>
                                    <li>✓ +5% más si compras &gt; 3 unidades</li>
                                    <li>✓ Envío GRATIS</li>
                                    <li>✓ Canasta guardada por email</li>
                                </ul>
                                <button className="w-full bg-amber-600 text-white py-2 rounded font-semibold hover:bg-amber-700">
                                    Activar membresía
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            );

            // HOME (Catálogo con selector de cantidades directo)
            const renderHomePage = () => (
                <div className="min-h-screen bg-gray-50 pb-20">
                    <div className="bg-amber-700 text-white p-4 sticky top-0 z-10">
                        <div className="flex justify-between items-center mb-1">
                            <h1 className="text-2xl font-bold">La Posta</h1>
                            <button onClick={() => setCurrentPage('cart')} className="text-2xl relative">
                                🛒
                                {cart.length > 0 && (
                                    <span className="absolute -top-1 -right-2 bg-red-500 text-white text-xs rounded-full w-5 h-5 flex items-center justify-center font-bold">
                                        {cartSummary.totalItems}
                                    </span>
                                )}
                            </button>
                        </div>
                        <p className="text-xs text-amber-100 mb-2">Sesión: {userEmail}</p>
                        {hasMembership && (
                            <div className="bg-amber-600 px-3 py-1 rounded-full text-sm w-fit">
                                ✓ Membresía activa - 10% + 5% descuentos
                            </div>
                        )}
                    </div>

                    <div className="bg-white border-b-2 border-amber-200 p-4">
                        <div className="flex items-start gap-2">
                            <span className="text-green-600 text-xl flex-shrink-0 mt-0.5">✓</span>
                            <div className="text-sm">
                                <p className="font-semibold text-gray-800">Todos nuestros productos tienen sello SENASA</p>
                                <p className="text-gray-600 text-xs mt-1">Composición y seguridad garantizada</p>
                            </div>
                        </div>
                    </div>

                    {savedCart && (
                        <div className="bg-blue-50 border-l-4 border-blue-500 p-4 m-4 rounded">
                            <p className="font-semibold text-blue-900 mb-1">📅 Canasta guardada para {userEmail}</p>
                            <p className="text-sm text-blue-800 mb-3">
                                {savedCart.items ? savedCart.items.length : 0} productos
                            </p>
                            <button
                                onClick={() => {
                                    setCart(savedCart.items || []);
                                    setSavedCart(null);
                                }}
                                className="bg-blue-600 text-white px-4 py-2 rounded text-sm font-semibold"
                            >
                                Reproducir canasta
                            </button>
                        </div>
                    )}

                    <div className="p-4 space-y-6">
                        {Object.entries({
                            'Panificados': products.panificados,
                            'Harinas': products.harinas,
                            'Snacks': products.snacks,
                            'Congelados': products.congelados
                        }).map(([category, items]) => (
                            <div key={category}>
                                <h3 className="text-lg font-bold text-gray-800 mb-3">{category}</h3>
                                <div className="space-y-3">
                                    {items.map(product => {
                                        const inCart = cart.find(p => p.id === product.id);
                                        const qty = inCart ? (inCart.quantity || 1) : 0;
                                        const pricePerUnit = calculatePrice(product, qty || 1);
                                        const originalPrice = product.price;
                                        const discountPercent = hasMembership ? 10 : 0;
                                        
                                        return (
                                            <div
                                                key={product.id}
                                                className="bg-white p-4 rounded-lg border border-gray-200 hover:shadow-md transition"
                                            >
                                                <div 
                                                    className="flex justify-between items-start gap-3 cursor-pointer"
                                                    onClick={() => setCurrentPage(`product-${product.id}`)}
                                                >
                                                    <div className="flex-1">
                                                        <div className="flex items-center gap-2 mb-1">
                                                            <span className="text-2xl">{product.image}</span>
                                                            <span className="text-xs bg-amber-100 text-amber-800 px-2 py-0.5 rounded font-semibold">{product.brand}</span>
                                                        </div>
                                                        <p className="font-semibold text-gray-800">{product.name}</p>
                                                        <div className="flex items-center gap-2 mt-1">
                                                            {product.certified && (
                                                                <span className="text-xs bg-green-100 text-green-700 px-2 py-0.5 rounded">
                                                                    ✓ Sin TACC
                                                                </span>
                                                            )}
                                                            {discountPercent > 0 && (
                                                                <span className="text-xs bg-red-100 text-red-700 px-2 py-0.5 rounded font-semibold">
                                                                    -{discountPercent}%
                                                                </span>
                                                            )}
                                                        </div>
                                                    </div>
                                                    <div className="text-right">
                                                        <p className="font-bold text-lg text-amber-700">${pricePerUnit}</p>
                                                        {hasMembership && (
                                                            <p className="text-xs text-gray-500 line-through">${originalPrice}</p>
                                                        )}
                                                        <p className="text-xs text-gray-600 mt-1">Stock: {product.stock}</p>
                                                    </div>
                                                </div>

                                                {/* SECTOR DE CANTIDADES DIRECTO EN CATÁLOGO */}
                                                <div className="mt-3 pt-3 border-t border-gray-100 flex items-center justify-between gap-2">
                                                    <button
                                                        onClick={() => setCurrentPage(`product-${product.id}`)}
                                                        className="text-xs text-gray-500 hover:text-amber-700 underline"
                                                    >
                                                        Ver info
                                                    </button>

                                                    {qty === 0 ? (
                                                        <button
                                                            onClick={() => updateProductQuantity(product, 1)}
                                                            className="bg-amber-700 text-white px-4 py-1.5 rounded-lg font-semibold text-sm hover:bg-amber-800 transition"
                                                        >
                                                            + Agregar
                                                        </button>
                                                    ) : (
                                                        <div className="flex items-center gap-2 bg-amber-50 p-1 rounded-lg border border-amber-200">
                                                            <button
                                                                onClick={() => updateProductQuantity(product, qty - 1)}
                                                                className="w-7 h-7 bg-white text-amber-800 rounded font-bold shadow-sm flex items-center justify-center hover:bg-amber-100"
                                                            >
                                                                −
                                                            </button>
                                                            <span className="text-sm font-bold text-amber-900 min-w-[20px] text-center">{qty}</span>
                                                            <button
                                                                onClick={() => updateProductQuantity(product, qty + 1)}
                                                                className="w-7 h-7 bg-amber-700 text-white rounded font-bold shadow-sm flex items-center justify-center hover:bg-amber-800"
                                                            >
                                                                +
                                                            </button>
                                                        </div>
                                                    )}
                                                </div>
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>
                        ))}
                    </div>

                    <div className="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 flex justify-around p-3 z-20">
                        <button
                            onClick={() => setCurrentPage('home')}
                            className="flex flex-col items-center gap-1 text-amber-700 font-semibold"
                        >
                            <span className="text-2xl">🏠</span>
                            <span className="text-xs">Inicio</span>
                        </button>
                        <button
                            onClick={() => setCurrentPage('cart')}
                            className={`flex flex-col items-center gap-1 font-semibold relative ${cart.length > 0 ? 'text-amber-700' : 'text-gray-500'}`}
                        >
                            <span className="text-2xl">🛒</span>
                            {cart.length > 0 && (
                                <span className="absolute -top-2 -right-2 bg-red-500 text-white text-xs rounded-full w-5 h-5 flex items-center justify-center font-bold">
                                    {cartSummary.totalItems}
                                </span>
                            )}
                            <span className="text-xs">Carrito</span>
                        </button>
                        <button
                            onClick={() => setCurrentPage('profile')}
                            className="flex flex-col items-center gap-1 text-gray-500 font-semibold hover:text-amber-700"
                        >
                            <span className="text-2xl">👤</span>
                            <span className="text-xs">Perfil</span>
                        </button>
                        <button
                            onClick={() => setCurrentPage('community')}
                            className="flex flex-col items-center gap-1 text-gray-500 font-semibold"
                        >
                            <span className="text-2xl">👥</span>
                            <span className="text-xs">Comunidad</span>
                        </button>
                    </div>
                </div>
            );

            // USER PROFILE (NUEVA SECCIÓN REQUERIDA POR TUTOR)
            const renderProfilePage = () => (
                <div className="min-h-screen bg-gray-50 pb-20">
                    <div className="bg-amber-700 text-white p-4">
                        <button onClick={() => setCurrentPage('home')} className="text-amber-100 mb-2">← Volver al inicio</button>
                        <h1 className="text-2xl font-bold">Mi Perfil</h1>
                    </div>

                    <div className="p-4 space-y-4 max-w-md mx-auto">
                        {/* DATOS PERSONALES */}
                        <div className="bg-white p-4 rounded-lg shadow-sm border border-gray-200">
                            <h3 className="font-bold text-gray-800 text-lg mb-2">📋 Mis Datos</h3>
                            <div className="text-sm space-y-1 text-gray-600">
                                <p><strong className="text-gray-800">Nombre:</strong> {userName || 'Cliente La Posta'}</p>
                                <p><strong className="text-gray-800">Email:</strong> {userEmail}</p>
                                <p><strong className="text-gray-800">Membresía:</strong> {hasMembership ? '✨ Activa (10% Desc + Envío Gratis)' : 'Estándar'}</p>
                            </div>
                        </div>

                        {/* ÚLTIMA COMPRA Y REPETIR PEDIDO */}
                        <div className="bg-white p-4 rounded-lg shadow-sm border border-gray-200">
                            <h3 className="font-bold text-gray-800 text-lg mb-3">📦 Última Compra</h3>
                            {lastOrder ? (
                                <div className="space-y-3">
                                    <div className="bg-amber-50 p-3 rounded border border-amber-200">
                                        <div className="flex justify-between text-xs text-amber-900 mb-2">
                                            <span><strong>Pedido:</strong> {lastOrder.orderNumber}</span>
                                            <span>{lastOrder.date}</span>
                                        </div>
                                        <ul className="text-sm space-y-1 text-gray-700">
                                            {lastOrder.items.map((it, idx) => (
                                                <li key={idx} className="flex justify-between">
                                                    <span>{it.image} {it.name} (x{it.quantity})</span>
                                                    <span>${calculatePrice(it, it.quantity) * it.quantity}</span>
                                                </li>
                                            ))}
                                        </ul>
                                        <div className="border-t border-amber-200 mt-2 pt-2 flex justify-between font-bold text-amber-900 text-sm">
                                            <span>Total pagado:</span>
                                            <span>${lastOrder.total}</span>
                                        </div>
                                    </div>
                                    <button
                                        onClick={() => {
                                            setCart(lastOrder.items);
                                            setCurrentPage('cart');
                                        }}
                                        className="w-full bg-amber-700 text-white py-2 rounded-lg font-semibold text-sm hover:bg-amber-800 transition"
                                    >
                                        🔄 Repetir este pedido
                                    </button>
                                </div>
                            ) : (
                                <p className="text-sm text-gray-500 italic">Todavía no realizaste ninguna compra.</p>
                            )}
                        </div>

                        {/* COMPRAS RECURRENTES / MARCAS FAVORITAS */}
                        <div className="bg-white p-4 rounded-lg shadow-sm border border-gray-200">
                            <h3 className="font-bold text-gray-800 text-lg mb-2">⭐ Productos Recurrentes</h3>
                            <p className="text-xs text-gray-500 mb-3">Tus marcas y productos habituales sin TACC:</p>
                            
                            <div className="space-y-2">
                                {products.panificados.slice(0, 2).concat(products.harinas.slice(0, 1)).map(prod => (
                                    <div key={prod.id} className="flex items-center justify-between p-2 bg-gray-50 rounded border border-gray-100">
                                        <div className="flex items-center gap-2">
                                            <span className="text-xl">{prod.image}</span>
                                            <div>
                                                <p className="text-xs font-bold text-amber-800">{prod.brand}</p>
                                                <p className="text-xs font-semibold text-gray-800">{prod.name}</p>
                                            </div>
                                        </div>
                                        <button
                                            onClick={() => updateProductQuantity(prod, 1)}
                                            className="bg-amber-100 text-amber-800 text-xs px-3 py-1 rounded font-bold hover:bg-amber-200"
                                        >
                                            + Pedir
                                        </button>
                                    </div>
                                ))}
                            </div>
                        </div>

                        <button
                            onClick={() => {
                                setCurrentPage('welcome');
                                setUserEmail('');
                                setUserName('');
                                setCart([]);
                                localStorage.removeItem('lapostaUser');
                                localStorage.removeItem('lapostaUserName');
                            }}
                            className="w-full bg-red-100 text-red-700 py-3 rounded-lg font-semibold text-sm hover:bg-red-200 transition mt-4"
                        >
                            Cerrar Sesión
                        </button>
                    </div>

                    <div className="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 flex justify-around p-3 z-20">
                        <button onClick={() => setCurrentPage('home')} className="flex flex-col items-center gap-1 text-gray-500 font-semibold">
                            <span className="text-2xl">🏠</span>
                            <span className="text-xs">Inicio</span>
                        </button>
                        <button onClick={() => setCurrentPage('cart')} className="flex flex-col items-center gap-1 text-gray-500 font-semibold relative">
                            <span className="text-2xl">🛒</span>
                            <span className="text-xs">Carrito</span>
                        </button>
                        <button onClick={() => setCurrentPage('profile')} className="flex flex-col items-center gap-1 text-amber-700 font-semibold">
                            <span className="text-2xl">👤</span>
                            <span className="text-xs">Perfil</span>
                        </button>
                        <button onClick={() => setCurrentPage('community')} className="flex flex-col items-center gap-1 text-gray-500 font-semibold">
                            <span className="text-2xl">👥</span>
                            <span className="text-xs">Comunidad</span>
                        </button>
                    </div>
                </div>
            );

            // PRODUCT DETAIL
            const renderProductPage = (productId) => {
                const product = allProducts.find(p => p.id === productId);
                if (!product) return null;

                const inCart = cart.find(p => p.id === productId);
                const qty = inCart ? (inCart.quantity || 1) : 1;
                const pricePerUnit = calculatePrice(product, qty);

                return (
                    <div className="min-h-screen bg-gray-50 pb-12">
                        <button
                            onClick={() => setCurrentPage('home')}
                            className="p-4 text-amber-700 font-semibold"
                        >
                            ← Volver
                        </button>

                        <div className="p-6 max-w-md mx-auto">
                            <div className="text-6xl mb-4 text-center">{product.image}</div>
                            <span className="bg-amber-100 text-amber-800 text-xs px-3 py-1 rounded-full font-bold">{product.brand}</span>
                            <h1 className="text-2xl font-bold text-gray-800 my-2">{product.name}</h1>

                            <div className="bg-green-50 border-l-4 border-green-500 p-4 mb-6 rounded">
                                <p className="font-semibold text-green-900 mb-2">✓ Seguridad garantizada</p>
                                <p className="text-sm text-green-800 mb-3">Certificado sin TACC por SENASA</p>
                                <div className="bg-white p-3 rounded">
                                    <p className="text-xs font-semibold text-gray-700 mb-2">Composición:</p>
                                    <p className="text-sm text-gray-600">{product.composition}</p>
                                </div>
                            </div>

                            <div className="bg-white p-4 rounded-lg mb-6 shadow-sm">
                                <p className="text-sm text-gray-600 mb-2">Precio unitario:</p>
                                <p className="text-3xl font-bold text-amber-700">${pricePerUnit}</p>
                            </div>

                            <button
                                onClick={() => updateProductQuantity(product, qty + 1)}
                                disabled={product.stock === 0}
                                className="w-full py-3 rounded-lg font-semibold text-white bg-amber-700 hover:bg-amber-800"
                            >
                                + Agregar al carrito
                            </button>
                        </div>
                    </div>
                );
            };

            // CART
            const renderCartPage = () => {
                const { subtotal, total, shipping } = calculateCartTotal();
                const originalSubtotal = cart.reduce((sum, item) => sum + (item.price * (item.quantity || 1)), 0);
                const discountAmount = originalSubtotal - subtotal;

                return (
                    <div className="min-h-screen bg-gray-50 pb-24">
                        <div className="bg-amber-700 text-white p-4">
                            <button
                                onClick={() => setCurrentPage('home')}
                                className="text-amber-100 mb-3"
                            >
                                ← Volver
                            </button>
                            <h1 className="text-2xl font-bold">Mi Carrito</h1>
                        </div>

                        {cart.length === 0 ? (
                            <div className="p-6 text-center">
                                <p className="text-2xl mb-3">🛒</p>
                                <p className="text-gray-600">Tu carrito está vacío</p>
                            </div>
                        ) : (
                            <div className="p-4 space-y-4 max-w-md mx-auto">
                                <div className="bg-amber-50 border-l-4 border-amber-600 p-3 rounded text-amber-900 text-xs font-medium">
                                    ⏱️ <strong>Tiempo de preparación:</strong> Mínimo <strong>3 días hábiles</strong> de preparación.
                                </div>

                                {cart.map((item, idx) => {
                                    const qty = item.quantity || 1;
                                    const pricePerUnit = calculatePrice(item, qty);
                                    const itemTotal = pricePerUnit * qty;
                                    
                                    return (
                                        <div key={idx} className="bg-white p-4 rounded-lg shadow-sm">
                                            <div className="flex justify-between items-start mb-2">
                                                <div>
                                                    <p className="text-xs text-amber-800 font-bold">{item.brand}</p>
                                                    <p className="text-lg font-semibold">{item.image} {item.name}</p>
                                                    <p className="text-sm text-gray-600">${pricePerUnit} x {qty} = ${itemTotal}</p>
                                                </div>
                                                <button
                                                    onClick={() => setCart(cart.filter((_, i) => i !== idx))}
                                                    className="text-red-600 font-semibold text-sm p-1"
                                                >
                                                    ✕
                                                </button>
                                            </div>
                                            
                                            <div className="flex items-center gap-2 mt-2">
                                                <button
                                                    onClick={() => updateProductQuantity(item, qty - 1)}
                                                    className="px-3 py-1 bg-gray-200 rounded font-bold"
                                                >
                                                    −
                                                </button>
                                                <span className="text-sm font-semibold">{qty}</span>
                                                <button
                                                    onClick={() => updateProductQuantity(item, qty + 1)}
                                                    className="px-3 py-1 bg-gray-200 rounded font-bold"
                                                >
                                                    +
                                                </button>
                                            </div>
                                        </div>
                                    );
                                })}

                                <div className="bg-white p-4 rounded-lg shadow-sm mt-6">
                                    <div className="flex justify-between mb-2 pb-2 border-b">
                                        <p className="text-gray-700">Subtotal:</p>
                                        <p className="font-semibold">${subtotal}</p>
                                    </div>
                                    {discountAmount > 0 && (
                                        <div className="flex justify-between mb-2 pb-2 border-b text-green-700">
                                            <p>Descuentos:</p>
                                            <p className="font-semibold">-${discountAmount}</p>
                                        </div>
                                    )}
                                    <div className="flex justify-between mb-2 pb-2 border-b">
                                        <p className="text-gray-700">Envío:</p>
                                        <p className="font-semibold">${shipping}</p>
                                    </div>
                                    <div className="flex justify-between mt-3 pt-3 border-t-2 border-amber-700">
                                        <p className="text-lg font-bold">Total:</p>
                                        <p className="text-2xl font-bold text-amber-700">${total}</p>
                                    </div>
                                </div>

                                <div className="space-y-3 mt-6">
                                    <button
                                        onClick={() => {
                                            if (!selectedDeliveryDate) {
                                                setSelectedDeliveryDate(minDateStr);
                                            }
                                            setCurrentPage('checkout');
                                        }}
                                        className="w-full bg-amber-700 text-white py-3 rounded-lg font-semibold hover:bg-amber-800"
                                    >
                                        Proceder al pago
                                    </button>
                                </div>
                            </div>
                        )}
                    </div>
                );
            };

            // CHECKOUT
            const renderCheckoutPage = () => {
                const { subtotal, total, shipping } = calculateCartTotal();

                if (orderPlaced) {
                    const orderData = {
                        orderNumber: generatedOrderNumber,
                        date: new Date().toLocaleDateString('es-AR'),
                        items: cart,
                        total: total
                    };

                    return (
                        <div className="min-h-screen bg-gradient-to-b from-green-50 to-green-100 p-6 flex flex-col justify-center items-center">
                            <div className="text-6xl mb-4">✓</div>
                            <h1 className="text-3xl font-bold text-green-900 mb-2">¡Pedido Confirmado!</h1>
                            <p className="text-green-700 mb-6">Gracias, {userName}</p>

                            <div className="bg-white rounded-lg p-6 max-w-md w-full shadow-lg mb-6 space-y-4">
                                <div className="bg-amber-50 p-4 rounded-lg border-2 border-amber-700 text-center">
                                    <p className="text-sm text-amber-700 font-semibold mb-1">Número de pedido:</p>
                                    <p className="text-2xl font-bold text-amber-900">{generatedOrderNumber}</p>
                                </div>

                                {paymentMethod === 'transfer' && (
                                    <div className="bg-amber-100 border-l-4 border-amber-600 p-4 rounded text-amber-900">
                                        <p className="font-bold text-sm mb-1">📩 Datos bancarios enviados a tu email</p>
                                        <p className="text-xs leading-relaxed">
                                            Te hemos enviado a <strong>{userEmail}</strong> los datos de la cuenta corriente/CBU para realizar la transferencia.
                                        </p>
                                        <p className="text-xs font-semibold mt-2 text-red-700">
                                            ⚠️ Recordá que tenés 12 horas para realizar el pago. De lo contrario, la compra se cancelará automáticamente.
                                        </p>
                                    </div>
                                )}

                                <div className="space-y-3 pt-2 text-sm">
                                    <div className="flex items-start gap-3">
                                        <span className="text-xl">📅</span>
                                        <div>
                                            <p className="font-semibold">Fecha y Horario de Entrega</p>
                                            <p className="text-gray-600">{selectedDeliveryDate} ({selectedTimeSlot})</p>
                                        </div>
                                    </div>
                                    <div className="flex items-start gap-3">
                                        <span className="text-xl">📍</span>
                                        <div>
                                            <p className="font-semibold">Domicilio</p>
                                            <p className="text-gray-600">{address}</p>
                                            {deliveryNotes && (
                                                <p className="text-xs text-amber-800 italic mt-0.5">Nota: "{deliveryNotes}"</p>
                                            )}
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <div className="w-full space-y-2 max-w-md">
                                {/* TEXTO ACTUALIZADO: 5 min aprox. */}
                                <button
                                    onClick={() => window.open('https://form.typeform.com/to/YVsFpl4n', '_blank')}
                                    className="w-full bg-blue-600 text-white py-3 rounded-lg font-semibold hover:bg-blue-700 shadow"
                                >
                                    Completar formulario de feedback (5 min aprox.)
                                </button>
                                <button
                                    onClick={() => {
                                        setLastOrder(orderData);
                                        localStorage.setItem(`lapostaLastOrder_${userEmail}`, JSON.stringify(orderData));
                                        setCart([]);
                                        setOrderPlaced(false);
                                        setCurrentPage('home');
                                    }}
                                    className="w-full bg-green-700 text-white py-3 rounded-lg font-semibold hover:bg-green-800"
                                >
                                    Volver al inicio
                                </button>
                            </div>
                        </div>
                    );
                }

                return (
                    <div className="min-h-screen bg-gray-50 pb-20">
                        <div className="bg-amber-700 text-white p-4 flex items-center justify-between">
                            <button onClick={() => setCurrentPage('cart')} className="text-amber-100">← Volver</button>
                            <h1 className="text-xl font-bold">Completar compra</h1>
                            <div></div>
                        </div>

                        <div className="p-4 space-y-4 max-w-md mx-auto">
                            <div className="bg-white p-4 rounded-lg shadow-sm space-y-3">
                                <h3 className="font-semibold text-gray-800 border-b pb-2">1. Entrega y Domicilio</h3>
                                
                                <div>
                                    <label className="block text-xs font-semibold text-gray-600 mb-1">Dirección exacta *</label>
                                    <input
                                        type="text"
                                        placeholder="Calle, número, piso/depto"
                                        value={address}
                                        onChange={(e) => setAddress(e.target.value)}
                                        className="w-full px-3 py-2 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-amber-500 text-sm"
                                    />
                                </div>

                                <div>
                                    <label className="block text-xs font-semibold text-gray-600 mb-1">Aclaraciones para el delivery (opcional)</label>
                                    <input
                                        type="text"
                                        placeholder="Ej: Tocar timbre, casa verde..."
                                        value={deliveryNotes}
                                        onChange={(e) => setDeliveryNotes(e.target.value)}
                                        className="w-full px-3 py-2 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-amber-500 text-sm"
                                    />
                                </div>

                                <div className="grid grid-cols-1 gap-3 pt-2">
                                    <div>
                                        <label className="block text-xs font-semibold text-gray-600 mb-1">Fecha de Entrega (Mín. 3 días hábiles)</label>
                                        <input
                                            type="date"
                                            min={minDateStr}
                                            value={selectedDeliveryDate || minDateStr}
                                            onChange={(e) => setSelectedDeliveryDate(e.target.value)}
                                            className="w-full px-3 py-2 border border-gray-300 rounded text-sm focus:outline-none focus:ring-2 focus:ring-amber-500"
                                        />
                                    </div>
                                    <div>
                                        <label className="block text-xs font-semibold text-gray-600 mb-1">Rango Horario</label>
                                        <select
                                            value={selectedTimeSlot}
                                            onChange={(e) => setSelectedTimeSlot(e.target.value)}
                                            className="w-full px-3 py-2 border border-gray-300 rounded text-sm focus:outline-none focus:ring-2 focus:ring-amber-500"
                                        >
                                            <option value="09:00 - 13:00">Mañana (09:00 a 13:00 hs)</option>
                                            <option value="14:00 - 18:00">Tarde (14:00 a 18:00 hs)</option>
                                            <option value="18:00 - 21:00">Noche (18:00 a 21:00 hs)</option>
                                        </select>
                                    </div>
                                </div>
                            </div>

                            <div className="bg-white p-4 rounded-lg shadow-sm space-y-3">
                                <h3 className="font-semibold text-gray-800 border-b pb-2">2. Medio de Pago</h3>
                                
                                <div className="space-y-2">
                                    {[
                                        { id: 'mercadopago', name: 'Mercado Pago', icon: '📱' },
                                        { id: 'credit', name: 'Tarjeta de Crédito', icon: '💳' },
                                        { id: 'debit', name: 'Tarjeta de Débito', icon: '💳' },
                                        { id: 'transfer', name: 'Transferencia Bancaria', icon: '🏦' },
                                    ].map(method => (
                                        <label
                                            key={method.id}
                                            className={`flex items-center gap-3 p-3 border rounded-lg cursor-pointer transition ${
                                                paymentMethod === method.id 
                                                    ? 'border-amber-600 bg-amber-50 font-semibold' 
                                                    : 'border-gray-200 hover:bg-gray-50'
                                            }`}
                                        >
                                            <input
                                                type="radio"
                                                name="payment"
                                                checked={paymentMethod === method.id}
                                                onChange={() => setPaymentMethod(method.id)}
                                                className="text-amber-600 focus:ring-amber-500"
                                            />
                                            <span className="text-lg">{method.icon}</span>
                                            <span className="text-sm">{method.name}</span>
                                        </label>
                                    ))}
                                </div>

                                {paymentMethod === 'transfer' && (
                                    <div className="bg-amber-100 border-l-4 border-amber-600 p-3 rounded text-amber-900 text-xs mt-3 leading-relaxed">
                                        ⚠️ <strong>Importante:</strong> Plazo máximo de <strong>12 horas</strong> para transferir.
                                    </div>
                                )}
                            </div>

                            <div className="bg-white p-4 rounded-lg shadow-sm">
                                <div className="flex justify-between font-bold text-lg mb-2">
                                    <span>Total a pagar:</span>
                                    <span className="text-amber-700">${total}</span>
                                </div>
                            </div>

                            <button
                                onClick={() => {
                                    if (address) {
                                        setGeneratedOrderNumber(generateOrderNumber());
                                        setOrderPlaced(true);
                                    } else {
                                        alert('Por favor completa la dirección de entrega.');
                                    }
                                }}
                                className="w-full bg-amber-700 text-white py-3 rounded-lg font-semibold hover:bg-amber-800 transition"
                            >
                                Confirmar pedido
                            </button>
                        </div>
                    </div>
                );
            };

            // COMMUNITY
            const renderCommunityPage = () => (
                <div className="min-h-screen bg-gray-50 pb-20">
                    <div className="bg-amber-700 text-white p-4">
                        <button onClick={() => setCurrentPage('home')} className="text-amber-100 mb-3">← Volver</button>
                        <h1 className="text-2xl font-bold">Comunidad sin TACC</h1>
                    </div>

                    <div className="p-4 space-y-4 max-w-md mx-auto">
                        <div className="bg-white p-4 rounded-lg shadow-sm">
                            <p className="font-semibold text-gray-800 mb-2">🍳 Recetas</p>
                            <p className="text-sm text-gray-600">Compartí tus recetas favoritas sin TACC</p>
                        </div>
                        <div className="bg-white p-4 rounded-lg shadow-sm">
                            <p className="font-semibold text-gray-800 mb-2">⭐ Restaurantes</p>
                            <p className="text-sm text-gray-600">Mapa de restaurantes sin TACC en CABA y AMBA</p>
                        </div>
                    </div>
                </div>
            );

            return (
                <div className="relative min-h-screen">
                    {currentPage === 'welcome' && renderWelcomePage()}
                    {currentPage === 'membership' && renderMembershipPage()}
                    {currentPage === 'home' && renderHomePage()}
                    {currentPage === 'profile' && renderProfilePage()}
                    {currentPage.startsWith('product-') && renderProductPage(currentPage.replace('product-', ''))}
                    {currentPage === 'cart' && renderCartPage()}
                    {currentPage === 'checkout' && renderCheckoutPage()}
                    {currentPage === 'community' && renderCommunityPage()}

                    {/* POP UP FLOTANTE DURACIÓN 6 SEG */}
                    {addedNotification && (
                        <div className="fixed bottom-16 left-0 right-0 px-4 z-50 animate-slide-up max-w-md mx-auto">
                            <div className="bg-gray-900 text-white p-4 rounded-xl shadow-2xl flex items-center justify-between gap-3 border border-gray-700">
                                <div className="flex items-center gap-3 overflow-hidden">
                                    <span className="text-3xl flex-shrink-0">{addedNotification.image}</span>
                                    <div className="truncate">
                                        <p className="text-xs text-green-400 font-bold uppercase tracking-wider">¡Agregado al carrito!</p>
                                        <p className="text-sm font-semibold truncate text-white">{addedNotification.name}</p>
                                    </div>
                                </div>

                                <div className="flex items-center gap-2 flex-shrink-0">
                                    <button
                                        onClick={() => {
                                            setAddedNotification(null);
                                            setCurrentPage('cart');
                                        }}
                                        className="bg-amber-600 hover:bg-amber-500 text-white text-xs font-bold px-3 py-2 rounded-lg transition shadow-md whitespace-nowrap"
                                    >
                                        Ir a Pagar →
                                    </button>
                                    <button
                                        onClick={() => setAddedNotification(null)}
                                        className="text-gray-400 hover:text-white p-1 text-base font-bold"
                                    >
                                        ✕
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const container = document.getElementById('root');
        const root = ReactDOM.createRoot(container);
        root.render(<LaPostaMVP />);
    </script>
</body>
</html>
