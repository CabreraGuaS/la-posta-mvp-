<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Posta - MVP Integrado</title>
    <!-- React 18 & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Babel Standalone para transformar JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
        
        @keyframes slideUp {
            from { transform: translateY(100%); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .animate-slide-up {
            animation: slideUp 0.3s ease-out forwards;
        }
    </style>
</head>
<body class="bg-gray-100">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const LaPostaMVP = () => {
            const [currentPage, setCurrentPage] = useState('welcome');
            const [cart, setCart] = useState([]);
            const [savedCart, setSavedCart] = useState(null);
            const [userEmail, setUserEmail] = useState('');
            const [userName, setUserName] = useState('');
            const [hasMembership, setHasMembership] = useState(false);

            // Historial de compras para la sección de Usuario / Carrito
            const [lastOrder, setLastOrder] = useState(null);

            // Estado para el cartel/notificación de "Producto Agregado"
            const [addedNotification, setAddedNotification] = useState(null);

            // Checkout state
            const [orderPlaced, setOrderPlaced] = useState(false);
            const [generatedOrderNumber, setGeneratedOrderNumber] = useState('');
            const [address, setAddress] = useState('');
            const [paymentMethod, setPaymentMethod] = useState('mercadopago');
            const [selectedDeliveryDate, setSelectedDeliveryDate] = useState('');
            const [selectedTimeSlot, setSelectedTimeSlot] = useState('09:00 - 13:00');
            const [deliveryNotes, setDeliveryNotes] = useState('');

            // Notificación flotante dura 6 segundos
            useEffect(() => {
                if (addedNotification) {
                    const timer = setTimeout(() => {
                        setAddedNotification(null);
                    }, 6000);
                    return () => clearTimeout(timer);
                }
            }, [addedNotification]);

            const getMinDeliveryDate = () => {
                const date = new Date();
                let addedDays = 0;
                while (addedDays < 3) {
                    date.setDate(date.getDate() + 1);
                    if (date.getDay() !== 0 && date.getDay() !== 6) {
                        addedDays++;
                    }
                }
                return date.toISOString().split('T')[0];
            };

            const minDateStr = getMinDeliveryDate();

            // Catálogo Extendido de Productos
            const products = {
                panificados: [
                    { id: 'p1', name: 'Pan sin TACC Integral (Fargo)', category: 'Panificados', price: 520, image: '🍞', brand: 'Fargo', composition: 'Almidón de maíz, harina de arroz, agua, sal, levadura, semillas', certified: true, stock: 15 },
                    { id: 'p2', name: 'Medialunas sin TACC', category: 'Panificados', price: 720, image: '🥐', brand: 'Celidarina', composition: 'Harina de arroz, manteca, azúcar, sal, levadura', certified: true, stock: 8 },
                    { id: 'p3', name: 'Galletitas de agua sin TACC', category: 'Panificados', price: 340, image: '🍘', brand: 'Smack', composition: 'Almidón de papa, aceite de girasol, sal, leudante', certified: true, stock: 20 }
                ],
                frescosAlmacen: [
                    { id: 'a1', name: 'Quinoa Real (500g)', category: 'Almacén', price: 2500, image: '🌾', brand: 'NutriBio', composition: '100% Quinoa real lavada y certificada', certified: true, stock: 10 },
                    { id: 'a2', name: 'Avena certificada sin TACC (500g)', category: 'Almacén', price: 1800, image: '🥣', brand: 'NaturAl', composition: 'Avena pura libre de gluten', certified: true, stock: 12 },
                    { id: 'a3', name: 'Aceite de Oliva Extra Virgen (500ml)', category: 'Almacén', price: 4500, image: '🫒', brand: 'Zuelo', composition: 'Aceite de oliva virgen extra', certified: true, stock: 15 },
                    { id: 'f1', name: 'Huevos de campo (6 unidades)', category: 'Frescos', price: 1300, image: '🥚', brand: 'Granja Rosa', composition: 'Huevos frescos de gallinas libres de jaula', certified: true, stock: 20 },
                    { id: 'f2', name: 'Bananas Ecuador (kg)', category: 'Verdulería', price: 1100, image: '🍌', brand: 'Fruver', composition: 'Fruta fresca seleccionada', certified: true, stock: 25 },
                    { id: 'f3', name: 'Papas Seleccionadas (kg)', category: 'Verdulería', price: 900, image: '🥔', brand: 'Fruver', composition: 'Papas lavadas calidad exportación', certified: true, stock: 30 },
                    { id: 'f4', name: 'Zucchini fresco (kg)', category: 'Verdulería', price: 1200, image: '🥒', brand: 'Fruver', composition: 'Verdura de estación', certified: true, stock: 14 },
                    { id: 'f5', name: 'Patas-muslos de Pollo (kg)', category: 'Carnicería', price: 3200, image: '🍗', brand: 'Avícola San Juan', composition: 'Pollo fresco trozado', certified: true, stock: 10 }
                ],
                harinas: [
                    { id: 'h1', name: 'Premezcla Universal sin TACC', category: 'Harinas', price: 1050, image: '🌾', brand: 'Santalucía', composition: 'Harina de arroz, almidón de maíz, goma xantana, sal', certified: true, stock: 12 },
                    { id: 'h2', name: 'Harina de Almendras Premium', category: 'Harinas', price: 2100, image: '🥜', brand: 'NutriFit', composition: '100% almendra molida, sin aditivos', certified: true, stock: 6 }
                ],
                snacks: [
                    { id: 's1', name: 'Barra de Chocolate Algarroba', category: 'Snacks', price: 480, image: '🍫', brand: 'Zafrán', composition: 'Algarroba, cacao, azúcar, aceite de coco', certified: true, stock: 18 },
                    { id: 's2', name: 'Barrita de Quinua y Miel', category: 'Snacks', price: 420, image: '🍱', brand: 'Crowie', composition: 'Quinua inflada, miel, almíbar, semillas', certified: true, stock: 14 }
                ],
                congelados: [
                    { id: 'c1', name: 'Empanadas de Carne sin TACC (6u)', category: 'Congelados', price: 1080, image: '🥟', brand: 'La Celiaca', composition: 'Carne vacuna, cebolla, especias, masa de arroz', certified: true, stock: 10 }
                ]
            };

            const allProducts = Object.values(products).flat();

            // Recetas de la Comunidad con pasos e ingredientes completos
            const communityRecipes = [
                {
                    id: 'rec1',
                    title: '🥣 Bowl tibio de quinoa y vegetales',
                    image: '🥗',
                    time: '25 minutos',
                    servings: '2 porciones',
                    ingredients: [
                        { text: '1 taza de quinoa', productId: 'a1' },
                        { text: '1 zucchini', productId: 'f4' },
                        { text: '1 zanahoria' },
                        { text: '½ morrón rojo' },
                        { text: '½ cebolla morada' },
                        { text: '1 puñado de espinaca fresca' },
                        { text: '2 cucharadas de aceite de oliva', productId: 'a3' },
                        { text: 'Jugo de ½ limón' },
                        { text: 'Sal, pimienta y pimentón ahumado' }
                    ],
                    steps: [
                        'Lavar bien la quinoa y cocinarla según las indicaciones del paquete.',
                        'Cortar los vegetales en cubos y saltearlos con aceite de oliva.',
                        'Agregar la espinaca hasta que se marchite.',
                        'Mezclar los vegetales con la quinoa.',
                        'Condimentar con limón, sal, pimienta y pimentón.'
                    ],
                    tip: 'Podés sumar pollo grillado, queso o garbanzos para aumentar el aporte de proteínas.'
                },
                {
                    id: 'rec2',
                    title: '🥞 Panqueques de banana y avena sin TACC',
                    image: '🥞',
                    time: '15 minutos',
                    servings: '2 porciones',
                    ingredients: [
                        { text: '2 bananas maduras', productId: 'f2' },
                        { text: '2 huevos', productId: 'f1' },
                        { text: '1 taza de avena certificada sin TACC', productId: 'a2' },
                        { text: '1 cucharadita de polvo para hornear sin TACC' },
                        { text: '1 cucharadita de esencia de vainilla' },
                        { text: 'Canela (opcional)' }
                    ],
                    steps: [
                        'Licuar todos los ingredientes hasta obtener una mezcla homogénea.',
                        'Calentar una sartén antiadherente apenas aceitada.',
                        'Cocinar pequeñas porciones durante 2 minutos por lado.',
                        'Servir con frutas frescas, miel o pasta de maní.'
                    ],
                    tip: 'Ideal para desayuno, merienda o vianda escolar.'
                },
                {
                    id: 'rec3',
                    title: '🍗 Pollo al horno con papas y romero',
                    image: '🍗',
                    time: '45 minutos',
                    servings: '4 porciones',
                    ingredients: [
                        { text: '4 supremas o patas-muslos de pollo', productId: 'f5' },
                        { text: '4 papas medianas', productId: 'f3' },
                        { text: '2 cucharadas de aceite de oliva', productId: 'a3' },
                        { text: 'Romero fresco o seco' },
                        { text: 'Ajo picado' },
                        { text: 'Sal y pimienta' },
                        { text: 'Jugo de 1 limón' }
                    ],
                    steps: [
                        'Precalentar el horno a 200 °C.',
                        'Cortar las papas en gajos.',
                        'Colocar el pollo y las papas en una fuente.',
                        'Agregar aceite, ajo, romero, limón, sal y pimienta.',
                        'Hornear entre 40 y 45 minutos, dando vuelta el pollo a mitad de cocción.'
                    ],
                    tip: 'Acompañar con una ensalada de hojas verdes y tomates para un plato completo.'
                }
            ];

            useEffect(() => {
                try {
                    const savedUser = localStorage.getItem('lapostaUser');
                    const savedUserName = localStorage.getItem('lapostaUserName');
                    const savedMembership = localStorage.getItem('lapostaMembership');
                    
                    if (savedUser) {
                        setUserEmail(savedUser);
                        const savedCartData = localStorage.getItem(`lapostaCart_${savedUser}`);
                        if (savedCartData) setSavedCart(JSON.parse(savedCartData));

                        const savedLastOrder = localStorage.getItem(`lapostaLastOrder_${savedUser}`);
                        if (savedLastOrder) setLastOrder(JSON.parse(savedLastOrder));
                    }
                    if (savedUserName) setUserName(savedUserName);
                    if (savedMembership) setHasMembership(JSON.parse(savedMembership));
                } catch (e) {
                    console.error("Error al cargar de localStorage", e);
                }
            }, []);

            const calculatePrice = (product, quantity = 1) => {
                let price = product.price;
                if (hasMembership) {
                    price = price * 0.9;
                }
                if (quantity > 3) {
                    price = price * 0.95;
                }
                return Math.round(price);
            };

            const calculateCartTotal = () => {
                let subtotal = 0;
                let totalItems = 0;
                
                cart.forEach(item => {
                    const qty = item.quantity || 1;
                    totalItems += qty;
                    const unitPrice = calculatePrice(item, qty);
                    subtotal += unitPrice * qty;
                });

                const shipping = hasMembership ? 0 : 350;
                const total = subtotal + shipping;

                return { subtotal, total, shipping, totalItems };
            };

            const generateOrderNumber = () => {
                const timestamp = Date.now().toString().slice(-6);
                const random = Math.floor(Math.random() * 1000).toString().padStart(3, '0');
                return `LP-${timestamp}-${random}`;
            };

            const cartSummary = calculateCartTotal();

            const isValidEmail = (email) => {
                return email.includes('@') && email.includes('.');
            };

            // Manejo dinámico de cantidad en carrito
            const updateProductQuantity = (product, newQty) => {
                const existingIndex = cart.findIndex(p => p.id === product.id);
                if (newQty <= 0) {
                    setCart(cart.filter(p => p.id !== product.id));
                } else if (existingIndex >= 0) {
                    const updated = [...cart];
                    updated[existingIndex].quantity = newQty;
                    setCart(updated);
                    if (newQty > (cart[existingIndex].quantity || 0)) {
                        setAddedNotification({ ...product, quantity: newQty });
                    }
                } else {
                    setCart([...cart, { ...product, quantity: newQty, cartId: Math.random() }]);
                    setAddedNotification({ ...product, quantity: newQty });
                }
            };

            const handleLogout = () => {
                if (confirm('¿Deseas salir y volver a la pantalla de inicio de sesión?')) {
                    setCurrentPage('welcome');
                    setUserEmail('');
                    setUserName('');
                    setCart([]);
                    localStorage.removeItem('lapostaUser');
                    localStorage.removeItem('lapostaUserName');
                }
            };

            // 1. WELCOME
            const renderWelcomePage = () => (
                <div className="min-h-screen bg-gradient-to-b from-amber-50 to-amber-100 p-6 flex flex-col justify-center items-center max-w-md mx-auto">
                    <div className="text-6xl mb-4">🌾</div>
                    <h1 className="text-4xl font-extrabold text-amber-900 mb-2">La Posta</h1>
                    <p className="text-lg font-semibold text-amber-800 mb-6 text-center">Tu mes sin TACC resuelto</p>
                    
                    <div className="bg-white rounded-xl p-6 w-full mb-6 shadow-lg border border-amber-200">
                        <div className="space-y-4 mb-6">
                            <div className="flex items-start gap-3">
                                <span className="text-green-600 text-xl mt-0.5">✓</span>
                                <div>
                                    <p className="font-semibold text-sm">Precios al por mayor</p>
                                    <p className="text-xs text-gray-600">Compra en volumen = menor costo</p>
                                </div>
                            </div>
                            <div className="flex items-start gap-3">
                                <span className="text-green-600 text-xl mt-0.5">✓</span>
                                <div>
                                    <p className="font-semibold text-sm">100% Certificado sin TACC</p>
                                    <p className="text-xs text-gray-600">Sello SENASA y marcas seguras</p>
                                </div>
                            </div>
                            <div className="flex items-start gap-3">
                                <span className="text-green-600 text-xl mt-0.5">✓</span>
                                <div>
                                    <p className="font-semibold text-sm">Recetas & Comunidad</p>
                                    <p className="text-xs text-gray-600">Sumá ingredientes directo a tu lista</p>
                                </div>
                            </div>
                        </div>

                        <label className="block text-xs font-semibold text-gray-600 mb-1">Tu Email *</label>
                        <input
                            type="email"
                            placeholder="ejemplo@email.com"
                            value={userEmail}
                            onChange={(e) => setUserEmail(e.target.value)}
                            className="w-full px-4 py-2 border border-gray-300 rounded-lg mb-3 focus:outline-none focus:ring-2 focus:ring-amber-500 text-sm"
                        />

                        <label className="block text-xs font-semibold text-gray-600 mb-1">Nombre (Opcional)</label>
                        <input
                            type="text"
                            placeholder="Tu nombre"
                            value={userName}
                            onChange={(e) => setUserName(e.target.value)}
                            className="w-full px-4 py-2 border border-gray-300 rounded-lg mb-4 focus:outline-none focus:ring-2 focus:ring-amber-500 text-sm"
                        />
                        
                        <button
                            onClick={() => {
                                if (isValidEmail(userEmail)) {
                                    const cleanEmail = userEmail.trim().toLowerCase();
                                    const displayName = userName.trim() || cleanEmail.split('@')[0];
                                    
                                    setUserEmail(cleanEmail);
                                    setUserName(displayName);

                                    localStorage.setItem('lapostaUser', cleanEmail);
                                    localStorage.setItem('lapostaUserName', displayName);

                                    const saved = localStorage.getItem(`lapostaCart_${cleanEmail}`);
                                    if (saved) setSavedCart(JSON.parse(saved));

                                    const savedOrder = localStorage.getItem(`lapostaLastOrder_${cleanEmail}`);
                                    if (savedOrder) setLastOrder(JSON.parse(savedOrder));

                                    setCurrentPage('membership');
                                }
                            }}
                            disabled={!isValidEmail(userEmail)}
                            className="w-full bg-amber-700 text-white py-3 rounded-lg font-semibold disabled:opacity-50 hover:bg-amber-800 transition text-sm shadow"
                        >
                            Ingresar →
                        </button>
                    </div>
                </div>
            );

            // 2. MEMBERSHIP
            const renderMembershipPage = () => (
                <div className="min-h-screen bg-gradient-to-b from-purple-50 to-purple-100 p-6 max-w-md mx-auto flex flex-col justify-between">
                    <div className="pt-4 space-y-4">
                        <div className="text-center mb-2">
                            <h2 className="text-2xl font-bold text-purple-900">¡Hola, {userName}! 👋</h2>
                            <p className="text-xs text-purple-700">Usuario: {userEmail}</p>
                        </div>

                        <h2 className="text-md font-bold text-gray-800">Seleccioná tu plan:</h2>
                        
                        <div className="space-y-4">
                            <div 
                                onClick={() => {
                                    setHasMembership(false);
                                    localStorage.setItem('lapostaMembership', 'false');
                                    setCurrentPage('home');
                                }}
                                className="bg-white p-5 rounded-xl border-2 border-gray-300 cursor-pointer hover:border-amber-500 transition shadow-sm space-y-2"
                            >
                                <p className="font-semibold text-base text-gray-800">Sin Membresía</p>
                                <p className="text-xs text-gray-600">Ideal para probar la plataforma</p>
                                <ul className="text-xs space-y-1 text-gray-600 pt-1">
                                    <li>✓ Acceso a catálogo completo sin TACC</li>
                                    <li>✓ Envío estándar: $350</li>
                                    <li>✗ Sin descuentos especiales</li>
                                </ul>
                                <button className="w-full bg-gray-200 text-gray-800 py-2 rounded-lg font-semibold text-xs mt-2">
                                    Empezar sin membresía
                                </button>
                            </div>

                            <div 
                                onClick={() => {
                                    setHasMembership(true);
                                    localStorage.setItem('lapostaMembership', 'true');
                                    setCurrentPage('home');
                                }}
                                className="bg-gradient-to-br from-amber-100 to-amber-50 p-5 rounded-xl border-2 border-amber-500 cursor-pointer hover:shadow-md transition relative ring-2 ring-amber-300 space-y-2"
                            >
                                <span className="absolute -top-3 right-4 bg-amber-600 text-white text-[10px] px-2.5 py-0.5 rounded-full font-bold">MEJOR OPCIÓN</span>
                                <p className="font-bold text-base text-amber-900">Membresía Mensual ✨</p>
                                <p className="text-xl font-extrabold text-amber-800">10% OFF en todo</p>
                                <ul className="text-xs space-y-1 text-amber-900 pt-1">
                                    <li>✓ <strong>10% OFF</strong> en todo el catálogo</li>
                                    <li>✓ <strong>+5% EXTRA</strong> si comprás más de 3 unidades</li>
                                    <li>✓ <strong>Envío GRATIS</strong> en todas tus compras</li>
                                </ul>
                                <button className="w-full bg-amber-700 text-white py-2 rounded-lg font-bold text-xs hover:bg-amber-800 transition mt-2 shadow">
                                    Activar membresía
                                </button>
                            </div>
                        </div>
                    </div>

                    <button 
                        onClick={handleLogout}
                        className="text-xs text-gray-500 text-center underline py-4 hover:text-red-600"
                    >
                        🚪 Salir / Cambiar usuario
                    </button>
                </div>
            );

            // 3. HOME
            const renderHomePage = () => (
                <div className="min-h-screen bg-gray-50 pb-20">
                    <div className="bg-amber-700 text-white p-4 sticky top-0 z-10 shadow">
                        <div className="flex justify-between items-center mb-1 max-w-md mx-auto">
                            <h1 className="text-xl font-bold flex items-center gap-2">
                                🌾 La Posta
                            </h1>
                            <div className="flex items-center gap-3">
                                <button onClick={() => setCurrentPage('cart')} className="text-2xl relative">
                                    🛒
                                    {cart.length > 0 && (
                                        <span className="absolute -top-1 -right-2 bg-red-500 text-white text-xs rounded-full w-5 h-5 flex items-center justify-center font-bold">
                                            {cartSummary.totalItems}
                                        </span>
                                    )}
                                </button>
                                <button 
                                    onClick={handleLogout} 
                                    title="Cerrar sesión" 
                                    className="text-xl bg-amber-800/60 hover:bg-amber-800 p-1.5 rounded-lg transition"
                                >
                                    🚪
                                </button>
                            </div>
                        </div>
                        <div className="flex justify-between text-[11px] text-amber-100 max-w-md mx-auto">
                            <span>Usuario: {userName || userEmail}</span>
                            <span className="font-semibold">{hasMembership ? '⭐ Socio Activo (10% OFF)' : '👤 Estándar'}</span>
                        </div>
                    </div>

                    <div className="bg-white border-b border-amber-200 p-3 shadow-sm">
                        <div className="flex items-center gap-2 max-w-md mx-auto text-xs text-gray-700">
                            <span className="text-green-600 text-base">✓</span>
                            <span>Todos los productos están certificados sin TACC (SENASA)</span>
                        </div>
                    </div>

                    <div className="p-4 space-y-6 max-w-md mx-auto">
                        {Object.entries({
                            'Panificados': products.panificados,
                            'Frescos y Almacén': products.frescosAlmacen,
                            'Harinas': products.harinas,
                            'Snacks': products.snacks,
                            'Congelados': products.congelados
                        }).map(([category, items]) => (
                            <div key={category}>
                                <h3 className="text-md font-bold text-gray-800 mb-3 border-b pb-1">{category}</h3>
                                <div className="space-y-3">
                                    {items.map(product => {
                                        const inCart = cart.find(p => p.id === product.id);
                                        const qty = inCart ? (inCart.quantity || 1) : 0;
                                        const pricePerUnit = calculatePrice(product, qty || 1);
                                        
                                        return (
                                            <div
                                                key={product.id}
                                                className="bg-white p-3.5 rounded-xl border border-gray-200 shadow-sm hover:shadow-md transition"
                                            >
                                                <div className="flex justify-between items-start gap-2">
                                                    <div className="flex items-start gap-2.5 flex-1 cursor-pointer" onClick={() => setCurrentPage(`product-${product.id}`)}>
                                                        <span className="text-3xl">{product.image}</span>
                                                        <div>
                                                            <span className="text-[10px] bg-amber-100 text-amber-800 px-2 py-0.5 rounded font-bold">{product.brand}</span>
                                                            <p className="font-semibold text-xs text-gray-800 mt-0.5">{product.name}</p>
                                                            <p className="text-xs font-bold text-amber-700 mt-1">${pricePerUnit}</p>
                                                        </div>
                                                    </div>

                                                    <div className="flex flex-col items-end gap-2">
                                                        <button
                                                            onClick={() => setCurrentPage(`product-${product.id}`)}
                                                            className="text-[11px] text-gray-500 hover:text-amber-700 underline"
                                                        >
                                                            Ver info
                                                        </button>

                                                        {qty === 0 ? (
                                                            <button
                                                                onClick={() => updateProductQuantity(product, 1)}
                                                                className="bg-amber-700 text-white px-3 py-1.5 rounded-lg text-xs font-bold hover:bg-amber-800 transition"
                                                            >
                                                                + Agregar
                                                            </button>
                                                        ) : (
                                                            <div className="flex items-center gap-1.5 bg-amber-50 p-1 rounded-lg border border-amber-200">
                                                                <button
                                                                    onClick={() => updateProductQuantity(product, qty - 1)}
                                                                    className="w-6 h-6 bg-white text-amber-800 rounded font-bold shadow-sm flex items-center justify-center text-xs"
                                                                >
                                                                    −
                                                                </button>
                                                                <span className="text-xs font-bold text-amber-900 min-w-[16px] text-center">{qty}</span>
                                                                <button
                                                                    onClick={() => updateProductQuantity(product, qty + 1)}
                                                                    className="w-6 h-6 bg-amber-700 text-white rounded font-bold shadow-sm flex items-center justify-center text-xs"
                                                                >
                                                                    +
                                                                </button>
                                                            </div>

                                    </div>

                                    {/* Pasos de Preparación */}
                                    <div className="bg-amber-50/50 p-3 rounded-lg border border-amber-100 space-y-2">
                                        <p className="text-xs font-bold text-amber-950 flex items-center gap-1">
                                            👨‍🍳 Preparación Paso a Paso:
                                        </p>
                                        <ol className="text-xs space-y-1.5 text-gray-700 list-decimal pl-4">
                                            {recipe.steps.map((step, sIdx) => (
                                                <li key={sIdx} className="pl-1 leading-relaxed">{step}</li>
                                            ))}
                                        </ol>
                                    </div>

                                    {/* Tip / Consejo */}
                                    <div className="bg-green-50 p-2.5 rounded-lg border border-green-200 text-xs text-green-900 flex items-start gap-1.5">
                                        <span>💚</span>
                                        <p><strong>Tip:</strong> {recipe.tip}</p>
                                    </div>
                                </div>
                            ))}
                        </div>

                        {/* SECCIÓN 2: RESTAURANTES Y LUGARES SIN TACC (EN DESARROLLO) */}
                        <div className="space-y-3 pt-2">
                            <div className="flex justify-between items-center border-b pb-1">
                                <h2 className="text-md font-bold text-gray-800">🍽️ Restaurantes & Lugares sin TACC</h2>
                                <span className="bg-amber-100 text-amber-800 text-[10px] font-extrabold px-2 py-0.5 rounded-full uppercase tracking-wider border border-amber-300">
                                    PRÓXIMAMENTE - En desarrollo
                                </span>
                            </div>

                            <div className="bg-white p-4 rounded-xl border border-gray-200 shadow-sm opacity-75 relative space-y-3">
                                <p className="text-xs text-gray-500">
                                    Muy pronto vas a poder descubrir lugares, pizzerías, cafeterías y bodegones 100% seguros y certificados sin TACC cerca tuyo en CABA y AMBA.
                                </p>

                                <div className="space-y-2 pointer-events-none filter blur-[0.3px]">
                                    <div className="p-2.5 bg-gray-50 rounded-lg border border-gray-100 flex justify-between items-center">
                                        <div>
                                            <p className="font-bold text-xs text-gray-800">📍 Pizzería Gourmet Sin TACC</p>
                                            <p className="text-[10px] text-gray-500">Palermo, CABA • 100% Libre de Gluten</p>
                                        </div>
                                        <span className="text-xs">⭐ 4.9</span>
                                    </div>
                                    <div className="p-2.5 bg-gray-50 rounded-lg border border-gray-100 flex justify-between items-center">
                                        <div>
                                            <p className="font-bold text-xs text-gray-800">☕ Café & Panadería Gluten Free</p>
                                            <p className="text-[10px] text-gray-500">Belgrano, CABA • Cocina exclusiva</p>
                                        </div>
                                        <span className="text-xs">⭐ 4.8</span>
                                    </div>
                                </div>

                                <button 
                                    disabled 
                                    className="w-full bg-gray-200 text-gray-500 py-2 rounded-lg font-bold text-xs cursor-not-allowed"
                                >
                                    🗺️ Explorar mapa interactivo (Próximamente)
                                </button>
                            </div>
                        </div>

                        {/* SECCIÓN 3: BLOG Y FEEDBACK DE USUARIOS (EN DESARROLLO) */}
                        <div className="space-y-3 pt-2">
                            <div className="flex justify-between items-center border-b pb-1">
                                <h2 className="text-md font-bold text-gray-800">💬 Blog & Foro de la Comunidad</h2>
                                <span className="bg-amber-100 text-amber-800 text-[10px] font-extrabold px-2 py-0.5 rounded-full uppercase tracking-wider border border-amber-300">
                                    PRÓXIMAMENTE - En desarrollo
                                </span>
                            </div>

                            <div className="bg-white p-4 rounded-xl border border-gray-200 shadow-sm opacity-75 relative space-y-3">
                                <p className="text-xs text-gray-500">
                                    Un espacio pensado para compartir experiencias, tips de cocina, recomendaciones de marcas y reseñas sobre productos libres de gluten.
                                </p>

                                <div className="space-y-2 pointer-events-none filter blur-[0.3px]">
                                    <div className="p-2.5 bg-amber-50/50 rounded-lg border border-amber-100">
                                        <p className="font-bold text-xs text-gray-800">💬 "¿Cuál es la mejor premezcla para hacer pan?"</p>
                                        <p className="text-[10px] text-gray-500 mt-0.5">Publicado por María P. • 12 comentarios</p>
                                    </div>
                                    <div className="p-2.5 bg-amber-50/50 rounded-lg border border-amber-100">
                                        <p className="font-bold text-xs text-gray-800">💡 Tip: Cómo conservar mejor los panificados sin TACC</p>
                                        <p className="text-[10px] text-gray-500 mt-0.5">Publicado por Equipo La Posta • 8 comentarios</p>
                                    </div>
                                </div>

                                <div className="pt-1">
                                    <textarea 
                                        disabled 
                                        placeholder="Escribí tu comentario o recomendación aquí..." 
                                        className="w-full p-2 border rounded-lg text-xs bg-gray-50 text-gray-400 cursor-not-allowed resize-none h-16"
                                    ></textarea>
                                    <button 
                                        disabled 
                                        className="w-full bg-gray-200 text-gray-500 py-2 rounded-lg font-bold text-xs mt-1 cursor-not-allowed"
                                    >
                                        Enviar comentario (Próximamente)
                                    </button>
                                </div>
                            </div>
                        </div>

                    </div>

                    <BottomNav active="community" />
                </div>
            );

            // BARRA DE NAVEGACIÓN INFERIOR
            const BottomNav = ({ active }) => (
                <div className="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 flex justify-around p-2.5 z-20 max-w-md mx-auto shadow-lg">
                    <button onClick={() => setCurrentPage('home')} className={`flex flex-col items-center text-[10px] font-bold ${active === 'home' ? 'text-amber-700' : 'text-gray-400'}`}>
                        <span className="text-xl">🏠</span>Catálogo
                    </button>
                    <button onClick={() => setCurrentPage('community')} className={`flex flex-col items-center text-[10px] font-bold ${active === 'community' ? 'text-amber-700' : 'text-gray-400'}`}>
                        <span className="text-xl">👥</span>Comunidad
                    </button>
                    <button onClick={() => setCurrentPage('cart')} className={`flex flex-col items-center text-[10px] font-bold relative ${active === 'cart' ? 'text-amber-700' : 'text-gray-400'}`}>
                        <span className="text-xl">🛒</span>
                        {cartSummary.totalItems > 0 && (
                            <span className="absolute -top-1 right-2 bg-red-500 text-white text-[9px] rounded-full w-4 h-4 flex items-center justify-center font-bold">
                                {cartSummary.totalItems}
                            </span>
                        )}
                        Carrito
                    </button>
                    <button onClick={() => setCurrentPage('profile')} className={`flex flex-col items-center text-[10px] font-bold ${active === 'profile' ? 'text-amber-700' : 'text-gray-400'}`}>
                        <span className="text-xl">👤</span>Perfil
                    </button>
                    <button onClick={handleLogout} className="flex flex-col items-center text-[10px] font-bold text-gray-400 hover:text-red-600">
                        <span className="text-xl">🚪</span>Salir
                    </button>
                </div>
            );

            return (
                <div className="relative min-h-screen">
                    {currentPage === 'welcome' && renderWelcomePage()}
                    {currentPage === 'membership' && renderMembershipPage()}
                    {currentPage === 'home' && renderHomePage()}
                    {currentPage === 'profile' && renderProfilePage()}
                    {currentPage.startsWith('product-') && renderProductPage(currentPage.replace('product-', ''))}
                    {currentPage === 'cart' && renderCartPage()}
                    {currentPage === 'checkout' && renderCheckoutPage()}
                    {currentPage === 'community' && renderCommunityPage()}

                    {/* POP UP FLOTANTE DE NOTIFICACIÓN */}
                    {addedNotification && (
                        <div className="fixed bottom-16 left-0 right-0 px-4 z-50 animate-slide-up max-w-md mx-auto">
                            <div className="bg-gray-900 text-white p-3.5 rounded-xl shadow-2xl flex items-center justify-between gap-3 border border-gray-700">
                                <div className="flex items-center gap-2.5 overflow-hidden">
                                    <span className="text-2xl flex-shrink-0">{addedNotification.image}</span>
                                    <div className="truncate">
                                        <p className="text-[10px] text-green-400 font-bold uppercase tracking-wider">¡Agregado al carrito!</p>
                                        <p className="text-xs font-semibold truncate text-white">{addedNotification.name}</p>
                                    </div>
                                </div>

                                <div className="flex items-center gap-2 flex-shrink-0">
                                    <button
                                        onClick={() => {
                                            setAddedNotification(null);
                                            setCurrentPage('cart');
                                        }}
                                        className="bg-amber-600 hover:bg-amber-500 text-white text-xs font-bold px-3 py-1.5 rounded-lg transition shadow whitespace-nowrap"
                                    >
                                        Ir a Pagar →
                                    </button>
                                    <button
                                        onClick={() => setAddedNotification(null)}
                                        className="text-gray-400 hover:text-white p-1 text-sm font-bold"
                                    >
                                        ✕
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const container = document.getElementById('root');
        const root = ReactDOM.createRoot(container);
        root.render(<LaPostaMVP />);
    </script>
</body>
</html>
